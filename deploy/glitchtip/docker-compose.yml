# GlitchTip 生产环境 Docker Compose 配置
# ============================================================================
# 用途：生产环境自建错误追踪平台（Sentry 开源替代），承接 agent.error_reporting_config
#       上报的生产错误事件，与开发环境 (docker/glitchtip/) 完全隔离。
#
# 与开发环境隔离说明：
#   - 端口隔离：postgres(5434) / redis(6381) / web(8001)
#     开发环境为 postgres(5433) / redis(6380) / web(8000)，两者可并行运行。
#   - 容器命名前缀：glitchtip-prod-*（开发环境为 glitchtip-*）。
#   - 数据卷：glitchtip-prod-postgres-data / glitchtip-prod-media（独立持久化）。
#   - 资源限制：显式 mem_limit 防止单服务 OOM 拖垮宿主机。
#
# 启动方式：
#   cd deploy/glitchtip
#   cp .env.example .env
#   # 编辑 .env：务必修改 POSTGRES_PASSWORD / SECRET_KEY（生产强校验）
#   docker compose up -d
#   # 首次启动需执行数据库迁移（web 容器入口已自动执行 migrate）
#
# 访问地址：http://localhost:8001
# 默认管理员：首次访问 Web 时通过注册页面创建首个超级用户
#
# 健康检查：
#   - web 服务内置 healthcheck，探测 /api/0/heartbeat/ 原生心跳端点
#   - 可通过 docker inspect glitchtip-prod-web 查看 Health.status
#
# 日志策略：
#   - 所有服务使用 json-file 驱动，单文件 50MB，最多 5 个轮转
#   - 生产建议后续接入 Loki/ELK 采集
# ============================================================================

services:
  # ─── PostgreSQL 数据库（生产） ──────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: glitchtip-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glitchtip}
      POSTGRES_USER: ${POSTGRES_USER:-glitchtip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glitchtip_prod_pass_change_me}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - glitchtip-prod-postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"  # 生产端口 5434，与开发环境 5433 隔离
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glitchtip} -d ${POSTGRES_DB:-glitchtip}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Redis 缓存 + Celery 任务队列（生产） ───────────────
  redis:
    image: redis:7-alpine
    container_name: glitchtip-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6381:6379"  # 生产端口 6381，与开发环境 6380 隔离
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── GlitchTip Web（Django 应用，生产） ─────────────────
  web:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-prod-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-glitchtip}:${POSTGRES_PASSWORD:-glitchtip_prod_pass_change_me}@postgres:5432/${POSTGRES_DB:-glitchtip}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-prod-secret-key-must-change}
      PORT: 8001
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8001}
      CELERY_WORKER_AUTOSCALE: ${CELERY_WORKER_AUTOSCALE:-1,3}
      CELERY_WORKER_MAX_TASKS_PER_CHILD: ${CELERY_WORKER_MAX_TASKS_PER_CHILD:-100}
      ENABLE_SOCIAL_AUTH: ${ENABLE_SOCIAL_AUTH:-False}
      EMAIL_URL: ${EMAIL_URL:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@localhost}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "8001:8001"  # 生产端口 8001，与开发环境 8000 隔离
    volumes:
      - glitchtip-prod-media:/code/uploads
    healthcheck:
      # GlitchTip v6.x 心跳端点为 /_health/（旧版 /api/0/heartbeat/ 已废弃）
      # 镜像无 curl，使用 python urllib 探测
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/_health/', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── GlitchTip Worker（Celery 异步任务 + Beat，生产） ────
  worker:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-prod-worker
    restart: unless-stopped  # 生产环境异常退出自动恢复
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-glitchtip}:${POSTGRES_PASSWORD:-glitchtip_prod_pass_change_me}@postgres:5432/${POSTGRES_DB:-glitchtip}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-prod-secret-key-must-change}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8001}
      CELERY_WORKER_AUTOSCALE: ${CELERY_WORKER_AUTOSCALE:-1,3}
      CELERY_WORKER_MAX_TASKS_PER_CHILD: ${CELERY_WORKER_MAX_TASKS_PER_CHILD:-100}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Shanghai}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  glitchtip-prod-postgres-data:
    name: glitchtip-prod-postgres-data
  glitchtip-prod-media:
    name: glitchtip-prod-media
