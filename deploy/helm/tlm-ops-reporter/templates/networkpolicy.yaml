{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tlm-ops-reporter.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tlm-ops-reporter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tlm-ops-reporter.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # [不易] Ingress: 拒绝所有入站（容器不暴露服务端口，仅读 PVC 日志生成日报）
  ingress: []
  egress:
    # [不易] 允许 DNS 解析（kube-dns），K8s 服务发现依赖
    # 如使用 CoreDNS，需将 k8s-app: kube-dns 改为 k8s-app: coredns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
