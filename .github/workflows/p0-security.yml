# P0 安全修复专用 CI 工作流
#
# 目的：自动触发 P0 安全修复防复发测试，确保脱敏逻辑不被回归。
#
# 触发条件：
# 1. 修改敏感数据相关模块时触发（paths 过滤）
# 2. 修改 P0 测试文件时触发
# 3. 修改 patches/p0_security/ 目录时触发
# 4. PR 到 main/develop 时触发
# 5. 每天凌晨 3 点定时触发
#
# 防护层级：
# - 静态扫描：检测贪婪正则模式
# - P0 回归测试：68 个测试用例
# - 补丁完整性验证：验证补丁可正常应用
# - 跨模块一致性验证：3 个脱敏模块行为一致

name: P0 安全验证

on:
  push:
    branches:
      - main
      - develop
      - 'phase2-**'
      - 'release/**'
    paths:
      # 敏感数据相关模块变更时触发
      - 'agent/error_reporting_config.py'
      - 'agent/logging_utils.py'
      - 'agent/utils/sensitive_data_filter.py'
      - 'agent/utils/token_redactor.py'
      - 'agent/log_system/safe_logger.py'
      - 'agent/memory/filter.py'
      # P0 测试文件变更时触发
      - 'tests/regression/test_p0_security_fix.py'
      # 补丁包变更时触发
      - 'patches/p0_security/**'
      # 静态扫描脚本变更时触发
      - 'scripts/scan_sensitive_regex.py'
      # CI 配置变更时触发
      - '.github/workflows/p0-security.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'agent/error_reporting_config.py'
      - 'agent/logging_utils.py'
      - 'agent/utils/sensitive_data_filter.py'
      - 'agent/utils/token_redactor.py'
      - 'agent/log_system/safe_logger.py'
      - 'agent/memory/filter.py'
      - 'tests/regression/test_p0_security_fix.py'
      - 'patches/p0_security/**'
      - 'scripts/scan_sensitive_regex.py'
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨 3 点运行（与主 CI 错开）

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ============================================================================
  # Job 1: 静态扫描 — 检测贪婪正则模式
  # ============================================================================
  static-scan:
    name: 敏感数据正则静态扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 运行敏感数据正则静态扫描
        run: |
          echo "=== 敏感数据正则静态扫描 ==="
          python scripts/scan_sensitive_regex.py --fix-hint
          echo "=== 静态扫描完成 ==="

      - name: 扫描结果上传
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: p0-static-scan-report
          path: |
            test_reports/
            scan_results/
          retention-days: 30

  # ============================================================================
  # Job 2: P0 回归测试 — 68 个防复发测试用例
  # ============================================================================
  p0-regression-test:
    name: P0 安全回归测试
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install -e .

      - name: 运行 P0 安全回归测试
        run: |
          echo "=== 运行 P0 安全修复防复发回归测试 ==="
          python -m pytest \
            tests/regression/test_p0_security_fix.py \
            -v \
            --tb=short \
            --cov=agent/error_reporting_config \
            --cov=agent/logging_utils \
            --cov=agent/utils/sensitive_data_filter \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=test_reports/p0-security-junit.xml
          echo "=== P0 安全回归测试全部通过 ==="

      - name: 测试结果汇总
        if: always()
        run: |
          echo "=== P0 安全回归测试结果汇总 ==="
          echo "Python 版本: ${{ matrix.python-version }}"
          echo "测试文件: tests/regression/test_p0_security_fix.py"
          echo "预期测试数: 68"
          if [ -f test_reports/p0-security-junit.xml ]; then
            echo "--- JUnit 报告 ---"
            cat test_reports/p0-security-junit.xml | head -50
          fi

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: p0-security-test-results-py${{ matrix.python-version }}
          path: |
            test_reports/
            htmlcov/
          retention-days: 30

  # ============================================================================
  # Job 3: 补丁完整性验证
  # ============================================================================
  patch-integrity:
    name: 补丁完整性验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 验证补丁文件存在
        run: |
          echo "=== 验证补丁包文件完整性 ==="
          if [ ! -d patches/p0_security ]; then
            echo "❌ patches/p0_security/ 目录不存在"
            exit 1
          fi
          if [ ! -f patches/p0_security/README.md ]; then
            echo "❌ patches/p0_security/README.md 不存在"
            exit 1
          fi
          if [ ! -f patches/p0_security/p0_security_test_extension.patch ]; then
            echo "❌ patches/p0_security/p0_security_test_extension.patch 不存在"
            exit 1
          fi
          echo "✅ 补丁包文件完整性验证通过"
          echo "--- 补丁包内容 ---"
          ls -la patches/p0_security/

      - name: 验证补丁可应用
        run: |
          echo "=== 验证补丁可正常应用 ==="
          # 检查补丁格式
          git apply --check patches/p0_security/p0_security_test_extension.patch
          if [ $? -eq 0 ]; then
            echo "✅ 补丁格式验证通过（git apply --check）"
          else
            echo "⚠️ 补丁可能已应用或格式有误，检查状态..."
            # 补丁可能已经应用过，这是正常情况
            exit 0
          fi

      - name: 验证测试用例数量
        run: |
          echo "=== 验证 P0 测试用例数量 ==="
          TEST_COUNT=$(python -m pytest tests/regression/test_p0_security_fix.py --collect-only -q 2>/dev/null | tail -1 | grep -oP '\d+' | head -1)
          echo "实际测试用例数: $TEST_COUNT"
          if [ "$TEST_COUNT" -lt 68 ]; then
            echo "❌ 测试用例数 ($TEST_COUNT) 少于预期 (68)"
            exit 1
          fi
          echo "✅ 测试用例数量验证通过 ($TEST_COUNT >= 68)"

  # ============================================================================
  # Job 4: 跨模块一致性验证
  # ============================================================================
  cross-module-consistency:
    name: 跨模块脱敏一致性验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: 运行跨模块一致性测试
        run: |
          echo "=== 运行跨模块脱敏一致性测试 ==="
          python -m pytest \
            tests/regression/test_p0_security_fix.py::TestCrossModuleConsistency \
            tests/regression/test_p0_security_fix.py::TestLoggingUtilsGreedyRegexRegression \
            tests/regression/test_p0_security_fix.py::TestLoggingUtilsBearerTokenRegression \
            tests/regression/test_p0_security_fix.py::TestSensitiveDataFilterGreedyRegexRegression \
            tests/regression/test_p0_security_fix.py::TestSensitiveDataFilterBearerRegression \
            -v --tb=short
          echo "=== 跨模块一致性验证通过 ==="

  # ============================================================================
  # Job 5: 测试总结
  # ============================================================================
  p0-security-summary:
    name: P0 安全验证总结
    runs-on: ubuntu-latest
    needs: [static-scan, p0-regression-test, patch-integrity, cross-module-consistency]
    if: always()
    steps:
      - name: 生成总结报告
        run: |
          echo "=== P0 安全验证总结 ==="
          echo "时间: $(date)"
          echo ""
          echo "| 验证项 | 状态 |"
          echo "|--------|------|"
          echo "| 静态扫描 | ${{ needs.static-scan.result == 'success' && '✅ 通过' || '❌ 失败' }} |"
          echo "| P0 回归测试 | ${{ needs.p0-regression-test.result == 'success' && '✅ 通过' || '❌ 失败' }} |"
          echo "| 补丁完整性 | ${{ needs.patch-integrity.result == 'success' && '✅ 通过' || '❌ 失败' }} |"
          echo "| 跨模块一致性 | ${{ needs.cross-module-consistency.result == 'success' && '✅ 通过' || '❌ 失败' }} |"
          echo ""
          if [ "${{ needs.static-scan.result }}" == "success" ] && \
             [ "${{ needs.p0-regression-test.result }}" == "success" ] && \
             [ "${{ needs.patch-integrity.result }}" == "success" ] && \
             [ "${{ needs.cross-module-consistency.result }}" == "success" ]; then
            echo "✅ P0 安全验证全部通过！"
          else
            echo "❌ P0 安全验证存在失败项，请检查！"
            exit 1
          fi

      - name: 失败通知
        if: failure()
        run: |
          echo "❌ P0 安全验证失败！"
          echo "请检查以下内容："
          echo "1. 是否引入了贪婪正则模式（\\S+, [^\"']*）"
          echo "2. 是否破坏了 Bearer Token 脱敏逻辑"
          echo "3. 是否破坏了 & 分隔的 URL 参数保留逻辑"
          echo "4. 补丁包文件是否完整"
          echo ""
          echo "修复指南：参考 patches/p0_security/README.md"
