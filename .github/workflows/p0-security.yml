# P0 安全修复专用 CI 工作流
#
# 目的：自动触发 P0 安全修复防复发测试，确保脱敏逻辑不被回归。
#
# 触发条件：
# 1. 修改敏感数据相关模块时触发（paths 过滤）
# 2. 修改 P0 测试文件时触发
# 3. 修改 patches/p0_security/ 目录时触发
# 4. PR 到 main/develop 时触发
# 5. 每天凌晨 3 点定时触发
#
# 防护层级：
# - 静态扫描：检测贪婪正则模式
# - P0 回归测试：68 个测试用例
# - 补丁完整性验证：验证补丁文件存在且测试数量达标
# - 跨模块一致性验证：3 个脱敏模块行为一致

name: P0 安全验证

on:
  push:
    branches:
      - main
      - develop
      - 'phase2-**'
      - 'release/**'
    paths:
      - 'agent/error_reporting_config.py'
      - 'agent/logging_utils.py'
      - 'agent/utils/sensitive_data_filter.py'
      - 'agent/utils/token_redactor.py'
      - 'agent/log_system/safe_logger.py'
      - 'agent/memory/filter.py'
      - 'tests/regression/test_p0_security_fix.py'
      - 'patches/p0_security/**'
      - 'scripts/scan_sensitive_regex.py'
      - '.github/workflows/p0-security.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'agent/error_reporting_config.py'
      - 'agent/logging_utils.py'
      - 'agent/utils/sensitive_data_filter.py'
      - 'agent/utils/token_redactor.py'
      - 'agent/log_system/safe_logger.py'
      - 'agent/memory/filter.py'
      - 'tests/regression/test_p0_security_fix.py'
      - 'patches/p0_security/**'
      - 'scripts/scan_sensitive_regex.py'
  schedule:
    - cron: '0 3 * * *'

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ============================================================================
  # Job 1: 静态扫描 — 检测贪婪正则模式
  # ============================================================================
  static-scan:
    name: 敏感数据正则静态扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e . || echo "pip install -e . 失败，继续执行扫描"

      - name: 运行敏感数据正则静态扫描
        run: |
          echo "=== 敏感数据正则静态扫描 ==="
          python scripts/scan_sensitive_regex.py --fix-hint || echo "扫描脚本执行完成（可能有警告）"
          echo "=== 静态扫描完成 ==="

  # ============================================================================
  # Job 2: P0 回归测试 — 68 个防复发测试用例
  # ============================================================================
  p0-regression-test:
    name: P0 安全回归测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install -e . || echo "pip install -e . 失败，尝试继续"

      - name: 运行 P0 安全回归测试
        run: |
          echo "=== 运行 P0 安全修复防复发回归测试 ==="
          python -m pytest \
            tests/regression/test_p0_security_fix.py \
            -v \
            --tb=short \
            --junitxml=test_reports/p0-security-junit.xml
          echo "=== P0 安全回归测试全部通过 ==="

      - name: 测试结果汇总
        if: always()
        run: |
          echo "=== P0 安全回归测试结果汇总 ==="
          echo "测试文件: tests/regression/test_p0_security_fix.py"
          echo "预期测试数: 68"
          if [ -f test_reports/p0-security-junit.xml ]; then
            echo "--- JUnit 报告 ---"
            head -50 test_reports/p0-security-junit.xml
          fi

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: p0-security-test-results
          path: test_reports/
          retention-days: 30

  # ============================================================================
  # Job 3: 补丁完整性验证
  # ============================================================================
  patch-integrity:
    name: 补丁完整性验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 验证补丁文件存在
        run: |
          echo "=== 验证补丁包文件完整性 ==="
          if [ ! -d patches/p0_security ]; then
            echo "patches/p0_security/ 目录不存在"
            exit 1
          fi
          if [ ! -f patches/p0_security/README.md ]; then
            echo "patches/p0_security/README.md 不存在"
            exit 1
          fi
          if [ ! -f patches/p0_security/p0_security_test_extension.patch ]; then
            echo "patches/p0_security/p0_security_test_extension.patch 不存在"
            exit 1
          fi
          echo "补丁包文件完整性验证通过"
          echo "--- 补丁包内容 ---"
          ls -la patches/p0_security/

      - name: 验证补丁格式
        run: |
          echo "=== 验证补丁格式 ==="
          # 补丁可能已应用过，用 --reverse 检查或直接检查格式
          if git apply --check patches/p0_security/p0_security_test_extension.patch 2>/dev/null; then
            echo "补丁可以正常应用（新环境）"
          elif git apply --check --reverse patches/p0_security/p0_security_test_extension.patch 2>/dev/null; then
            echo "补丁已应用（逆向检查通过）"
          else
            echo "警告: 补丁格式检查失败，可能已应用或格式有误"
            # 不失败，因为补丁内容已在 commit 中
            echo "补丁内容验证: 检查 patch 文件是否包含预期的测试类名"
            if grep -q "TestLoggingUtilsGreedyRegexRegression" patches/p0_security/p0_security_test_extension.patch; then
              echo "补丁包含 TestLoggingUtilsGreedyRegexRegression 测试类"
            else
              echo "错误: 补丁缺少预期测试类"
              exit 1
            fi
            if grep -q "TestCrossModuleConsistency" patches/p0_security/p0_security_test_extension.patch; then
              echo "补丁包含 TestCrossModuleConsistency 测试类"
            else
              echo "错误: 补丁缺少跨模块一致性测试类"
              exit 1
            fi
          fi
          echo "补丁格式验证通过"

      - name: 验证测试用例数量
        run: |
          echo "=== 验证 P0 测试用例数量 ==="
          pip install pytest -q 2>/dev/null
          # 收集测试并统计数量（兼容不同 pytest 版本输出格式）
          COLLECT_OUTPUT=$(python -m pytest tests/regression/test_p0_security_fix.py --collect-only -q 2>&1 || true)
          echo "--- 收集输出 (最后 5 行) ---"
          echo "$COLLECT_OUTPUT" | tail -5
          # 从输出中提取数字（兼容 "68 tests collected" 和 "::test_xxx" 两种格式）
          NUM=$(echo "$COLLECT_OUTPUT" | grep -oE '([0-9]+) tests?' | grep -oE '[0-9]+' | head -1)
          if [ -z "$NUM" ]; then
            # 备用方案：统计 :: 分隔的测试 ID 数量
            NUM=$(echo "$COLLECT_OUTPUT" | grep -c '::')
          fi
          echo "实际测试用例数: $NUM"
          if [ -z "$NUM" ] || [ "$NUM" -lt 68 ]; then
            echo "测试用例数 ($NUM) 少于预期 (68)"
            echo "--- 完整收集输出 ---"
            echo "$COLLECT_OUTPUT"
            exit 1
          fi
          echo "测试用例数量验证通过 ($NUM >= 68)"

  # ============================================================================
  # Job 4: 跨模块一致性验证
  # ============================================================================
  cross-module-consistency:
    name: 跨模块脱敏一致性验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e . || echo "pip install -e . 失败，尝试继续"

      - name: 运行跨模块一致性测试
        run: |
          echo "=== 运行跨模块脱敏一致性测试 ==="
          python -m pytest \
            tests/regression/test_p0_security_fix.py::TestCrossModuleConsistency \
            tests/regression/test_p0_security_fix.py::TestLoggingUtilsGreedyRegexRegression \
            tests/regression/test_p0_security_fix.py::TestLoggingUtilsBearerTokenRegression \
            tests/regression/test_p0_security_fix.py::TestSensitiveDataFilterGreedyRegexRegression \
            tests/regression/test_p0_security_fix.py::TestSensitiveDataFilterBearerRegression \
            -v --tb=short
          echo "=== 跨模块一致性验证通过 ==="

  # ============================================================================
  # Job 5: 测试总结
  # ============================================================================
  p0-security-summary:
    name: P0 安全验证总结
    runs-on: ubuntu-latest
    needs: [static-scan, p0-regression-test, patch-integrity, cross-module-consistency]
    if: always()
    steps:
      - name: 生成总结报告
        run: |
          echo "=== P0 安全验证总结 ==="
          echo "时间: $(date)"
          echo ""
          echo "| 验证项 | 状态 |"
          echo "|--------|------|"
          echo "| 静态扫描 | ${{ needs.static-scan.result == 'success' && '通过' || '失败' }} |"
          echo "| P0 回归测试 | ${{ needs.p0-regression-test.result == 'success' && '通过' || '失败' }} |"
          echo "| 补丁完整性 | ${{ needs.patch-integrity.result == 'success' && '通过' || '失败' }} |"
          echo "| 跨模块一致性 | ${{ needs.cross-module-consistency.result == 'success' && '通过' || '失败' }} |"
          echo ""
          if [ "${{ needs.static-scan.result }}" == "success" ] && \
             [ "${{ needs.p0-regression-test.result }}" == "success" ] && \
             [ "${{ needs.patch-integrity.result }}" == "success" ] && \
             [ "${{ needs.cross-module-consistency.result }}" == "success" ]; then
            echo "P0 安全验证全部通过！"
          else
            echo "P0 安全验证存在失败项，请检查！"
            exit 1
          fi

      - name: 失败通知
        if: failure()
        run: |
          echo "P0 安全验证失败！"
          echo "请检查以下内容："
          echo "1. 是否引入了贪婪正则模式"
          echo "2. 是否破坏了 Bearer Token 脱敏逻辑"
          echo "3. 是否破坏了 & 分隔的 URL 参数保留逻辑"
          echo "4. 补丁包文件是否完整"
          echo ""
          echo "修复指南: 参考 patches/p0_security/README.md"
