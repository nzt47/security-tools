name: 云枢工具模块测试
on:
  push:
    branches: [main, develop, 'fix/**', 'feature/**']
    paths:
      - 'agent/tools/**'
      - 'agent/system_tools.py'
      - 'agent/pdf_tools.py'
      - 'agent/web/**'
      - 'agent/extensions/**'
      - 'agent/software_manager.py'
      - 'agent/tests/test_*tools*.py'
      - 'agent/tests/test_file_tools.py'
  pull_request:
    branches: [main, develop]
    paths:
      - 'agent/tools/**'
      - 'agent/system_tools.py'
      - 'agent/pdf_tools.py'
      - 'agent/web/**'
      - 'agent/extensions/**'
      - 'agent/software_manager.py'

jobs:
  tool-tests:
    name: 工具模块测试 (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock psutil
          pip install -e . || true

      - name: 运行工具模块测试
        run: |
          pytest agent/tests/test_file_tools.py \
                agent/tests/test_web_tools.py \
                agent/tests/test_ext_tools.py \
                agent/tests/test_pdf_tools.py \
                agent/tests/test_software_tools.py \
                agent/tests/test_system_tools.py \
                -v --tb=short --cov=agent.system_tools --cov=agent.pdf_tools \
                --cov=agent.web --cov=agent.extensions.manager \
                --cov=agent.software_manager \
                --cov-report=term-missing

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tool-coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30
