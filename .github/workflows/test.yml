name: 云枢系统测试流程
on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.10'
  COVERAGE_THRESHOLD: 70

jobs:
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      status: ${{ job.status }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 快速安装依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
        continue-on-error: true

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip --timeout=120
          pip install --timeout=120 flake8 black isort mypy pytest pytest-cov || true
          pip install -e .[dev] --timeout=120 || true
        continue-on-error: true

      - name: 代码格式检查
        run: |
          black --check --diff agent/ tests/ || true

      - name: 导入顺序检查
        run: |
          isort --check-only --diff agent/ tests/ || true

      - name: 类型检查
        run: |
          mypy agent/ --ignore-missing-imports || true

      - name: 风格检查
        run: |
          flake8 agent/ --max-line-length=120 --extend-ignore=E203,W503 || true

  unit-tests:
    name: 单元测试 (Python ${{ matrix.python-version }} - ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 快速安装依赖 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
        continue-on-error: true

      - name: 安装依赖 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip --timeout=180
          pip install --timeout=180 pytest pytest-cov pytest-mock pytest-xdist pytest-timeout || true
          pip install -e . --timeout=180 || true
        continue-on-error: true

      - name: 快速安装依赖 (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
        continue-on-error: true

      - name: 安装依赖 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip --timeout=180
          pip install --timeout=180 pytest pytest-cov pytest-mock pytest-xdist pytest-timeout || true
          pip install -e .[windows] --timeout=180 || true
        continue-on-error: true

      - name: 创建测试目录
        run: |
          mkdir -p test-results htmlcov

      - name: 运行单元测试
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=agent \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --maxfail=5 \
            -m "not slow" \
            --junitxml=test-results/unit-test-results.xml \
            --timeout=300

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test-results/
          retention-days: 30

  integration-tests:
    name: 集成测试 (Python ${{ matrix.python-version }} - ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 快速安装依赖 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
        continue-on-error: true

      - name: 安装依赖 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip --timeout=180
          pip install --timeout=180 pytest pytest-cov pytest-mock pytest-asyncio pytest-timeout || true
          pip install -e . --timeout=180 || true
        continue-on-error: true

      - name: 快速安装依赖 (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
        continue-on-error: true

      - name: 安装依赖 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip --timeout=180
          pip install --timeout=180 pytest pytest-cov pytest-mock pytest-asyncio pytest-timeout || true
          pip install -e .[windows] --timeout=180 || true
        continue-on-error: true

      - name: 创建测试目录
        run: |
          mkdir -p test-results

      - name: 运行集成测试
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --cov=agent \
            --cov-report=xml \
            --junitxml=test-results/integration-test-results.xml \
            -m "not slow and not requires_llm" \
            --timeout=300

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test-results/
          retention-days: 30

  performance-tests:
    name: 性能测试 (Python ${{ matrix.python-version }} - ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 快速安装依赖 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
        continue-on-error: true

      - name: 安装依赖 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip --timeout=180
          pip install --timeout=180 pytest pytest-benchmark pytest-timeout || true
          pip install -e . --timeout=180 || true
        continue-on-error: true

      - name: 快速安装依赖 (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
        continue-on-error: true

      - name: 安装依赖 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip --timeout=180
          pip install --timeout=180 pytest pytest-benchmark pytest-timeout || true
          pip install -e .[windows] --timeout=180 || true
        continue-on-error: true

      - name: 创建测试目录
        run: |
          mkdir -p test_reports

      - name: 运行性能测试
        run: |
          pytest tests/performance/ \
            -v \
            --timeout=300 \
            --benchmark-only \
            --benchmark-json=test_reports/benchmark.json

      - name: 上传性能报告
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test_reports/benchmark.json
          retention-days: 30

  coverage-check:
    name: 覆盖率检查 (Python ${{ matrix.python-version }} - ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [unit-tests, integration-tests]
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e .

      - name: 安装依赖 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e .[windows]

      - name: 创建报告目录
        run: |
          mkdir -p test_reports

      - name: 下载覆盖率报告
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: htmlcov/

      - name: 检查覆盖率
        run: |
          coverage combine || true
          coverage report
          coverage report --fail-under=${{ env.COVERAGE_THRESHOLD }}

      - name: 生成覆盖率报告
        run: |
          coverage html -d test_reports/htmlcov
          coverage xml -o test_reports/coverage.xml

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: full-coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test_reports/
          retention-days: 30

  test-summary:
    name: 测试总结
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests, coverage-check]
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有测试结果
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: 创建报告目录
        run: |
          mkdir -p test_reports

      - name: 生成测试报告
        run: |
          cat > test_reports/summary.md << 'EOF'
          # 云枢系统测试报告

          ## 测试执行时间
          $(date)

          ## 测试结果汇总

          ### 单元测试
          - 测试数量: TBD
          - 通过率: TBD
          - 覆盖率: TBD

          ### 集成测试
          - 测试数量: TBD
          - 通过率: TBD

          ### 性能测试
          - 基准测试: TBD
          - 性能趋势: TBD

          ## 兼容性测试
          - Python 版本: 3.10, 3.11, 3.12
          - 平台: Ubuntu, Windows

          ## 建议

          EOF

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: test-summary-report
          path: test_reports/
          retention-days: 30

      - name: 通知成功
        if: success()
        run: |
          echo "✅ 所有测试通过！"

      - name: 通知失败
        if: failure()
        run: |
          echo "❌ 测试失败，请检查测试报告"
          echo "报告位置: test_reports/"