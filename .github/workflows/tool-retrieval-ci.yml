# 工具检索质量 CI — 防止工具描述/索引变更导致 recall 退化
#
# 【不易】保护 recall@5 >= 0.8 验收阈值,工具描述变更不得退化检索质量
# 【变易】触发路径覆盖 tool_index.json + tool_router_hybrid.py + 测试文件
# 【简易】纯 BM25 模式(AGENT_HYBRID_EMBEDDING=0),CI 环境一致性
#
# 关联:
#   - todo3: 评估测试 CI 集成(报告 §5.1 第 3 项)
#   - todo4: 负样本回归测试 CI 集成(预留 job,监控 xfail 数量漂移)

name: 工具检索质量 CI

on:
  push:
    branches: [main, master, develop, 'fix/**', 'feature/**']
    paths:
      # 检索器实现
      - 'agent/tool_router_hybrid.py'
      - 'agent/tool_router.py'
      # 工具索引数据(描述变更会直接影响 recall)
      - 'data/tool_index.json'
      # 测试与 fixture
      - 'tests/unit/test_tool_retrieval_quality.py'
      - 'tests/unit/test_tool_negative_samples.py'
      - 'tests/fixtures/tool_retrieval_eval.json'
      - 'data/tool_negative_samples.json'
      # 本 workflow 自身
      - '.github/workflows/tool-retrieval-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'agent/tool_router_hybrid.py'
      - 'agent/tool_router.py'
      - 'data/tool_index.json'
      - 'tests/unit/test_tool_retrieval_quality.py'
      - 'tests/unit/test_tool_negative_samples.py'
      - 'tests/fixtures/tool_retrieval_eval.json'
      - 'data/tool_negative_samples.json'
      - '.github/workflows/tool-retrieval-ci.yml'
  schedule:
    # 每天凌晨 3 点运行(防止 tool_index.json 漂移未被察觉)
    - cron: '0 3 * * *'

env:
  # 强制纯 BM25 模式(CI 环境 SentenceTransformer 不可用,会触发原生崩溃)
  AGENT_HYBRID_EMBEDDING: '0'
  PYTHONIOENCODING: 'utf-8'
  PYTHONPATH: '.'

jobs:
  # ============================================================================
  # todo3: 评估测试 recall@5 回归
  # ============================================================================
  retrieval-quality:
    name: 检索质量回归 (recall@5)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout psutil
          # 安装本项目(允许失败,失败时靠 PYTHONPATH=. 兜底)
          pip install -e . || true

      - name: 验证 BM25 降级模式生效
        run: |
          echo "=== 验证 AGENT_HYBRID_EMBEDDING=0 生效 ==="
          python -c "import os; print('AGENT_HYBRID_EMBEDDING =', os.environ.get('AGENT_HYBRID_EMBEDDING'))"
          test "$AGENT_HYBRID_EMBEDDING" = "0" || { echo "ERROR: AGENT_HYBRID_EMBEDDING 未设置为 0"; exit 1; }

      - name: 运行检索质量评估测试
        run: |
          pytest tests/unit/test_tool_retrieval_quality.py \
                -v --tb=short --timeout=60

      - name: 输出 recall@5 指标摘要
        if: always()
        run: |
          echo "=== 检索质量 CI 摘要 ==="
          echo "测试文件: tests/unit/test_tool_retrieval_quality.py"
          echo "评估 fixture: tests/fixtures/tool_retrieval_eval.json (20 中文 query)"
          echo "验收阈值: recall@5 >= 0.80"
          echo "降级模式: 纯 BM25 (AGENT_HYBRID_EMBEDDING=0)"
          echo ""
          echo "若本 CI 失败,说明工具描述/索引变更导致 recall 退化,"
          echo "请检查最近对 data/tool_index.json 或 agent/tool_router_hybrid.py 的修改。"

  # ============================================================================
  # todo4: 负样本回归测试(xfail 数量漂移监控)
  # ============================================================================
  negative-samples:
    name: 负样本回归 (xfail 漂移监控)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout psutil
          pip install -e . || true

      - name: 运行负样本回归测试
        run: |
          pytest tests/unit/test_tool_negative_samples.py \
                -v --tb=short --timeout=60

      - name: 输出 xfail 漂移监控摘要
        if: always()
        run: |
          echo "=== 负样本回归 CI 摘要 ==="
          echo "测试文件: tests/unit/test_tool_negative_samples.py"
          echo "负样本库: data/tool_negative_samples.json (v1.1, 10 组 25 query)"
          echo "预期: 27 passed + 12 xfailed (xfail 从初始 15 降至 12)"
          echo ""
          echo "xfail 漂移监控:"
          echo "- xfail 数量增加:说明工具描述变更引入新的 BM25 缺陷 case"
          echo "- xfail 数量减少:说明工具描述优化或 Reranker 上线修复了 case"
          echo "- 两者都需同步更新 _XFAIL_CASES 字典与 test_xfail_cases_count_is_15 断言"
