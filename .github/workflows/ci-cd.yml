name: Error Reporting System CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 2 * * *'

env:
  ERROR_REPORTING_FILE_LEVEL: error
  ERROR_REPORTING_CONSOLE_LEVEL: warning

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: grep -v -E 'pywin32|pypiwin32|comtypes' requirements.txt | pip install -r /dev/stdin
      
      - name: Run Ruff linter
        run: |
          pip install ruff
          ruff check . --output-format=github || true
      
      - name: Check code formatting
        run: |
          pip install black
          black --check . || true

  stress-test:
    name: Stress Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: grep -v -E 'pywin32|pypiwin32|comtypes' requirements.txt | pip install -r /dev/stdin
      
      - name: Run stress test
        run: python stress_test_error_reporting.py -c 50 -r 1000 -o ./logs/stress_test
      
      - name: Upload stress test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-results
          path: logs/stress_test/
          retention-days: 30
      
      - name: Check stress test results
        run: |
          if [ -f logs/stress_test/stress_test_report_*.json ]; then
            ERROR_RATE=$(cat logs/stress_test/stress_test_report_*.json | grep -o '"error_rate": [0-9.]*' | grep -o '[0-9.]*$')
            echo "Error rate: $ERROR_RATE%"
            if (( $(echo "$ERROR_RATE > 5" | bc -l) )); then
              echo "Error rate too high!"
              exit 1
            fi
          fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: grep -v -E 'pywin32|pypiwin32|comtypes' requirements.txt | pip install -r /dev/stdin
      
      - name: Run error reporter tests
        run: python test_error_reporter.py
      
      - name: Run DigitalLife integration test
        run: python test_digital_life_error_reporting.py

  docker-build:
    name: Docker Build and Test
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, stress-test]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker-compose build
      
      - name: Run container
        run: docker-compose up -d
      
      - name: Wait for container
        run: sleep 10
      
      - name: Check container status
        run: docker-compose ps
      
      - name: View logs
        run: docker-compose logs --tail=50
      
      - name: Cleanup
        if: always()
        run: docker-compose down

  nightly-full-test:
    name: Nightly Full Test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: grep -v -E 'pywin32|pypiwin32|comtypes' requirements.txt | pip install -r /dev/stdin
      
      - name: Run full stress test with high concurrency
        run: python stress_test_error_reporting.py -c 100 -r 5000 -o ./logs/nightly_test
      
      - name: Run Slack webhook test (dry run)
        run: python slack_config.py --test || true
      
      - name: Generate deployment report
        run: |
          python -c "
          import json
          import os
          from datetime import datetime
          
          report = {
            'test_time': datetime.now().isoformat(),
            'test_type': 'nightly_full_test',
            'results': []
          }
          
          for f in os.listdir('./logs/nightly_test'):
            if f.endswith('.json'):
              with open(f'./logs/nightly_test/{f}') as fp:
                report['results'].append(json.load(fp))
          
          with open('./logs/nightly_report.json', 'w') as fp:
            json.dump(report, fp, indent=2)
          "
      
      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-report
          path: logs/
          retention-days: 90

  deployment-ready:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [stress-test, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Create deployment summary
        run: |
          echo "# Deployment Verification Summary" > deployment_summary.md
          echo "" >> deployment_summary.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deployment_summary.md
          echo "**Commit:** ${{ github.sha }}" >> deployment_summary.md
          echo "**Branch:** main" >> deployment_summary.md
          echo "" >> deployment_summary.md
          echo "All tests passed! The system is ready for deployment." >> deployment_summary.md
          echo "" >> deployment_summary.md
          echo "## Test Results" >> deployment_summary.md
          echo "- Lint and Type Check: PASSED" >> deployment_summary.md
          echo "- Stress Test: PASSED" >> deployment_summary.md
          echo "- Integration Test: PASSED" >> deployment_summary.md
          echo "- Docker Build: PASSED" >> deployment_summary.md
      
      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment_summary.md
