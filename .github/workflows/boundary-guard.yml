# Boundary Guard — 静态分析防护（timedelta 溢出 + 硬编码边界值）
# 在 PR 合并前自动扫描 agent/ 下的高风险模式：
#   1. timedelta(days=参数) 溢出风险
#   2. 硬编码边界值（重试次数/超时值/容量限制）
# 详见: docs/observability/next_iteration_plan_phase3.md Task 2

name: Boundary Guard

on:
  pull_request:
    paths:
      - 'agent/**.py'
      - 'scripts/check_timedelta_overflow.py'
      - 'scripts/check_hardcoded_boundaries.py'
      - '.github/workflows/boundary-guard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  timedelta-overflow-scan:
    name: timedelta 溢出风险扫描
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行 timedelta 溢出扫描
        id: scan
        run: |
          python scripts/check_timedelta_overflow.py \
            --target agent/ \
            --json \
            --output boundary_scan_report.json
          # 提取高风险数
          high_risk=$(python -c "import json; print(json.load(open('boundary_scan_report.json'))['high_risk'])")
          echo "high_risk=$high_risk" >> $GITHUB_OUTPUT
          echo "::notice::扫描完成 — 高风险: $high_risk"

      - name: 上传扫描报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timedelta-scan-report
          path: boundary_scan_report.json
          retention-days: 30

      - name: PR 评论（高风险时警告）
        if: steps.scan.outputs.high_risk > 0
        uses: actions/github-script@v7
        with:
          script: |
            const highRisk = parseInt('${{ steps.scan.outputs.high_risk }}');
            if (highRisk > 3) {
              core.setFailed(`检测到 ${highRisk} 个高风险 timedelta 调用（基线 3），请检查扫描报告`);
            } else {
              core.warning(`检测到 ${highRisk} 个高风险 timedelta 调用（已校验，基线 3）`);
            }

  hardcoded-boundary-scan:
    name: 硬编码边界值扫描
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行硬编码边界值扫描
        id: scan
        run: |
          python scripts/check_hardcoded_boundaries.py \
            --target agent/ \
            --json \
            --output hardcoded_boundary_report.json
          # 提取高风险数和分类统计
          high_risk=$(python -c "import json; print(json.load(open('hardcoded_boundary_report.json'))['high_risk'])")
          echo "high_risk=$high_risk" >> $GITHUB_OUTPUT
          # 提取分类统计
          retry=$(python -c "import json; print(json.load(open('hardcoded_boundary_report.json'))['category_breakdown']['retry'])")
          timeout=$(python -c "import json; print(json.load(open('hardcoded_boundary_report.json'))['category_breakdown']['timeout'])")
          capacity=$(python -c "import json; print(json.load(open('hardcoded_boundary_report.json'))['category_breakdown']['capacity'])")
          echo "::notice::扫描完成 — 高风险: $high_risk (retry: $retry, timeout: $timeout, capacity: $capacity)"

      - name: 上传扫描报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardcoded-boundary-report
          path: hardcoded_boundary_report.json
          retention-days: 30

      - name: 基线检查（基线 99，新增未配置化硬编码时阻断）
        if: steps.scan.outputs.high_risk > 99
        uses: actions/github-script@v7
        with:
          script: |
            const highRisk = parseInt('${{ steps.scan.outputs.high_risk }}');
            const baseline = 99;
            if (highRisk > baseline) {
              core.setFailed(`检测到 ${highRisk} 个未配置化硬编码边界值（基线 ${baseline}），新增 ${highRisk - baseline} 个。请将新增硬编码配置化到 observability_config.py，或更新基线值。详见: docs/observability/hardcoded_boundary_baseline_report.json`);
            } else {
              core.warning(`硬编码边界值扫描通过 — 高风险: ${highRisk}/${baseline}（已校验存量）`);
            }
