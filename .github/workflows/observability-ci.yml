# 可观测性质量保障 CI/CD 工作流
# 功能：
# 1. 代码提交时：运行可观测性相关单元测试
# 2. 构建时：验证可观测性配置文件完整性
# 3. 部署前：运行端到端可观测性验证
# 4. 部署后：自动触发健康检查和告警验证

name: 可观测性质量保障

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'agent/monitoring/**'
      - 'agent/observability/**'
      - 'agent/prometheus_exporter.py'
      - 'monitoring/**'
      - 'tests/**/test_*tracing*.py'
      - 'tests/**/test_*prometheus*.py'
      - 'tests/**/test_*observability*.py'
      - 'tests/**/test_*dependency_graph*.py'
      - 'tests/**/test_*arch_rules*.py'
      - 'tests/**/test_*boundary*.py'
      - 'tests/**/test_*visibility*.py'
      - 'tests/**/test_*contract*.py'
      - 'tests/**/test_*cache*.py'
      - 'tests/integration/test_trace_*.py'
      - 'tests/boundary_config.yaml'
      - 'tests/contract/**'
      - '.github/workflows/observability-ci.yml'
      - '.coveragerc_scripts'
      - 'scripts/verify_*.py'
      - 'scripts/observability_*.py'
      - 'scripts/impact_analysis.py'
      - 'scripts/check_boundary_coverage.py'
      - 'scripts/visibility_report.py'
      - 'scripts/test_quality_assess.py'
      - 'docs/architecture/**'
      - 'docs/observability/**'
      - 'config.yaml'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨3点运行完整可观测性验证

env:
  PYTHON_VERSION: '3.11'
  OBSERVABILITY_TEST_PATHS: >-
    tests/unit/test_monitoring_tracing.py
    tests/unit/test_prometheus_exporter.py
    tests/unit/test_prometheus_alert_trigger.py
    tests/unit/test_tracing_middleware.py
    tests/unit/test_tracing_context_propagation.py
    tests/integration/test_trace_integration.py
    tests/integration/test_audit_trace.py

jobs:
  # ============================================================================
  # 阶段1：可观测性配置文件验证
  # ============================================================================
  observability-config-validation:
    name: 可观测性配置验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: 验证 Prometheus 告警规则配置
        run: |
          echo "=== 验证 Prometheus 告警规则 ==="
          python scripts/verify_alert_rules.py
        continue-on-error: false

      - name: 验证可观测性配置文件完整性
        run: |
          echo "=== 验证配置文件完整性 ==="
          python scripts/observability_config_validator.py

      - name: 上传配置验证报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observability-config-report
          path: |
            observability_config_report.json
            alert_deployment_checklist.md
          retention-days: 30

  # ============================================================================
  # 阶段2：架构影响可见性检查（新增）
  # 串行执行：依赖图生成 → 架构规则校验 → 变更影响分析
  # 违规阻断合并（存量豁免清单 docs/architecture/legacy_exemptions.json）
  # ============================================================================
  architecture-visibility-check:
    name: 架构影响可见性检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码（完整历史用于 git diff）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      # ── 步骤 1：生成模块依赖图 ──
      - name: 生成模块依赖图
        run: |
          echo "=== 步骤 1/3：生成模块依赖图 ==="
          python -m agent.observability.dependency_graph \
            --root agent \
            --output docs/architecture/module_dependency_graph.md \
            --json-output docs/architecture/dependency_graph.json
        continue-on-error: false

      # ── 步骤 2：架构规则校验（违规阻断合并）──
      - name: 架构规则校验
        id: arch_rules
        run: |
          echo "=== 步骤 2/3：架构规则校验 ==="
          python -m agent.observability.arch_rules \
            --check \
            --root agent \
            --exemptions docs/architecture/legacy_exemptions.json \
            --config config.yaml \
            --json-report docs/architecture/arch_rules_report.json \
            --md-report docs/architecture/arch_rules_report.md
        continue-on-error: false

      # ── 步骤 3：变更影响分析（仅 PR 时执行）──
      - name: 变更影响分析
        id: impact_analysis
        if: github.event_name == 'pull_request'
        run: |
          echo "=== 步骤 3/3：变更影响分析 ==="
          # 获取 PR 的 base 和 head ref
          BASE_REF="origin/${{ github.base_ref }}"
          HEAD_REF="HEAD"
          echo "对比基准: $BASE_REF → $HEAD_REF"
          python scripts/impact_analysis.py \
            --base "$BASE_REF" \
            --head "$HEAD_REF" \
            --root agent \
            --output docs/architecture/impact_report.md \
            --json-report docs/architecture/impact_report.json \
            --github-comment
        continue-on-error: true

      # ── PR 评论：变更影响报告 ──
      - name: 评论变更影响报告到 PR
        if: github.event_name == 'pull_request' && steps.impact_analysis.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'docs/architecture/impact_report.md';
            let body = '## 📊 变更影响分析报告\n\n';
            if (fs.existsSync(reportPath)) {
              body += fs.readFileSync(reportPath, 'utf8');
            } else {
              body += '未检测到变更影响或报告未生成。';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── 上传架构可见性报告 ──
      - name: 上传架构可见性报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architecture-visibility-report
          path: |
            docs/architecture/module_dependency_graph.md
            docs/architecture/dependency_graph.json
            docs/architecture/arch_rules_report.json
            docs/architecture/arch_rules_report.md
            docs/architecture/impact_report.md
            docs/architecture/impact_report.json
          retention-days: 30

      # ── 提交自动生成的依赖图文档 ──
      - name: 提交依赖图文档
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/architecture/module_dependency_graph.md docs/architecture/dependency_graph.json
          if git diff --staged --quiet; then
            echo "依赖图无变更，跳过提交"
          else
            git commit -m "docs(architecture): 自动更新模块依赖图 [skip ci]"
            git push
          fi

  # ============================================================================
  # 阶段3：可观测性单元测试
  # ============================================================================
  observability-unit-tests:
    name: 可观测性单元测试
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock pytest-asyncio
          pip install prometheus-client opentelemetry-api opentelemetry-sdk
          pip install -e .

      - name: 运行可观测性单元测试
        run: |
          echo "=== 运行可观测性单元测试 ==="
          # --cov-fail-under=0：本 job 仅测可观测性子模块，覆盖率不用于阻断
          # 全项目覆盖率由 visibility-report job 读取 pyproject.toml fail_under 作为基线
          python -m pytest \
            tests/unit/test_monitoring_tracing.py \
            tests/unit/test_prometheus_exporter.py \
            tests/unit/test_prometheus_alert_trigger.py \
            tests/unit/test_tracing_middleware.py \
            tests/unit/test_tracing_context_propagation.py \
            -v \
            --tb=short \
            --cov=agent.monitoring \
            --cov=agent.observability \
            --cov=agent.prometheus_exporter \
            --cov-fail-under=0 \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html

      - name: 生成可观测性测试覆盖率报告
        run: |
          echo "=== 可观测性模块覆盖率 ==="
          coverage report --include="*/monitoring/*,*/observability/*,*/prometheus_exporter*"

      # ── 优化脚本单元测试（仅 Python 3.11 matrix 运行，避免重复）──
      # 验证 visibility_report.py / test_quality_assess.py / impact_analysis.py
      # 三个脚本的缓存优化逻辑，覆盖缓存命中/未命中、边界条件、异常处理、并发安全
      #
      # ========== 变更履历（2026-06-27）==========
      # Bug 修复（3 个）：
      #   1. impact_analysis.py 空字符串匹配 Bug
      #      - 位置: _find_tests_for_module() 行 596-616
      #      - 问题: module_path 含空段时（如 "agent..core"），short_name/layer 为空字符串，
      #              "" in fname_lower 始终为 True，导致匹配所有测试文件
      #      - 修复: 添加 short_name_lower/layer_lower 真值检查，空字符串跳过匹配
      #   2. test_quality_assess.py 计数不一致 Bug
      #      - 位置: analyze_test_files() 行 162-165
      #      - 问题: test_file_count 在 try 块外递增，文件读取失败时仍计数，
      #              但 boundary_count/exception_count 在 try 内不计数，导致覆盖率被压低
      #      - 修复: test_file_count += 1 移入 try 块内，仅计成功读取的文件
      #   3. impact_analysis.py 重复收集优化不完整 Bug
      #      - 位置: _relate_tests() 行 546-564 / analyze() 行 292-296
      #      - 问题: analyze() 预收集 all_tests 后，_relate_tests 内部又收集一次，
      #              _collect_test_files 被调用 2 次，优化未完全消除冗余
      #      - 修复: _relate_tests 接受可选 all_tests 参数，analyze() 预收集一次并传递
      #
      # P0 测试用例（11 个，全部通过）：
      #   visibility_report.py（5 个）：
      #     P0-1  test_calc_track_coverage_skip_underscore_dirs        跳过 _ 开头子目录
      #     P0-2  test_calc_track_coverage_total_modules_zero_returns_100  total_modules=0 返回 100.0
      #     P0-3  test_calc_structured_log_coverage_no_logs_returns_100  total_logs=0 返回 100.0
      #     P0-4  test_calc_track_coverage_multi_file_subdir_break     break 语义只计 1 次
      #     P0-5  test_count_health_endpoints_multiple_in_same_file   正则全局匹配多个端点
      #   test_quality_assess.py（3 个）：
      #     P0-6  test_analyze_test_files_count_inconsistency_on_read_failure  修复后计数一致性
      #     P0-7  test_assess_boundary_coverage_with_illegal_rate_negative     非法负值处理
      #     P0-8  test_analyze_test_files_multiple_boundary_patterns_match_once 多模式 break
      #   impact_analysis.py（3 个）：
      #     P0-9  test_analyze_relate_tests_duplicate_collect_optimization_gap  修复后只收集 1 次
      #     P0-10 test_find_tests_for_module_empty_short_name_matches_all      修复后空 short_name 不误匹配
      #     P0-11 test_find_tests_for_module_empty_layer_matches_all           修复后空 layer 不误匹配
      #
      # 额外发现（同源 Bug 修复）：
      #   workflow_engine/matcher.py 的 keyword_match() 和 match_text() 存在相同空字符串匹配问题
      #   - keyword_match: 已添加 safe_keywords 过滤空字符串
      #   - match_text: 已添加 `if p and ...` 真值检查
      #
      # 测试统计: 82 passed, 0 failed, 0 skipped (71 既有 + 11 新增 P0)
      # ========================================
      - name: 运行优化脚本单元测试
        if: matrix.python-version == '3.11'
        run: |
          echo "=== 运行优化脚本单元测试（缓存优化逻辑验证）==="
          python -m pytest \
            tests/unit/test_visibility_report_cache.py \
            tests/unit/test_test_quality_assess_cache.py \
            tests/unit/test_impact_analysis_cache.py \
            -v \
            --tb=short \
            --cov=scripts \
            --cov-config=.coveragerc_scripts \
            --cov-fail-under=0 \
            --cov-report=term-missing

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observability-unit-test-results-py${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      # 注意：不再上传 coverage-report artifact 供 visibility-report 消费
      # 原因：本 job 仅测 5 个可观测性测试文件，生成的 coverage.xml 只覆盖
      #       agent.monitoring/agent.observability/agent.prometheus_exporter 三个子模块，
      #       line-rate≈19.7%，远低于全项目 40% 阈值，会导致 visibility-report 误判失败。
      # 修复：visibility-report job 不再下载部分覆盖的 coverage.xml，
      #       而是由 visibility_report.py 降级读取 pyproject.toml fail_under=40 作为基线。

  # ============================================================================
  # 阶段3：可观测性集成测试
  # ============================================================================
  observability-integration-tests:
    name: 可观测性集成测试
    runs-on: ubuntu-latest
    needs: [observability-config-validation, observability-unit-tests]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock pytest-asyncio
          pip install prometheus-client opentelemetry-api opentelemetry-sdk
          pip install -e .

      - name: 运行追踪集成测试
        run: |
          echo "=== 运行追踪集成测试 ==="
          python -m pytest \
            tests/integration/test_trace_integration.py \
            tests/integration/test_audit_trace.py \
            -v \
            --tb=short

      - name: 验证追踪上下文传播
        run: |
          echo "=== 验证追踪上下文传播 ==="
          python tests/trace_context_test.py || true

      - name: 上传集成测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observability-integration-test-results
          path: test-results/
          retention-days: 30

  # ============================================================================
  # 阶段4：可观测性功能验证（启动服务进行端到端测试）
  # ============================================================================
  observability-e2e-validation:
    name: 可观测性端到端验证
    runs-on: ubuntu-latest
    needs: [observability-integration-tests]
    if: github.event_name == 'push' || github.event_name == 'schedule'
    services:
      prometheus:
        image: prom/prometheus:latest
        ports:
          - 9090:9090
        volumes:
          - ${{ github.workspace }}/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
        options: >-
          --health-cmd "wget --quiet --spider http://localhost:9090/-/healthy || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests

      - name: 启动应用服务（后台）
        run: |
          echo "=== 启动应用服务 ==="
          python app_server.py &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          # 等待服务启动
          for i in {1..30}; do
            if curl -s http://localhost:5678/api/health > /dev/null 2>&1; then
              echo "服务已启动"
              break
            fi
            echo "等待服务启动... ($i/30)"
            sleep 2
          done

      - name: 运行可观测性端到端验证
        run: |
          echo "=== 运行可观测性端到端验证 ==="
          python tests/test_observability_e2e.py --report --url http://localhost:5678

      - name: 验证 Prometheus 指标抓取
        run: |
          echo "=== 验证 Prometheus 指标抓取 ==="
          python scripts/observability_prometheus_verify.py \
            --prometheus-url http://localhost:9090 \
            --app-url http://localhost:5678

      - name: 停止服务
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: 上传端到端验证报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observability-e2e-report
          path: |
            observability_e2e_report.json
            prometheus_verify_report.json
          retention-days: 30

  # ============================================================================
  # 阶段5：边界覆盖检查（新增）
  # 扫描测试函数名中的边界关键词，新增模块无边界测试时阻断合并
  # ============================================================================
  boundary-coverage-check:
    name: 边界覆盖检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码（完整历史用于 git diff 检测新增模块）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: 执行边界覆盖扫描
        id: boundary_scan
        run: |
          echo "=== 边界覆盖扫描 ==="
          python scripts/check_boundary_coverage.py \
            --config tests/boundary_config.yaml
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: false

      - name: 检查边界测试覆盖率阈值（≥5%）
        id: boundary_threshold
        run: |
          echo "=== 检查边界测试覆盖率阈值（≥5%）==="
          # 使用 --json-only 获取结构化数据，stderr 丢弃避免污染
          JSON_OUTPUT=$(python scripts/check_boundary_coverage.py --json-only 2>/dev/null) || true
          if [ -z "$JSON_OUTPUT" ]; then
            echo "❌ 边界扫描脚本未输出 JSON，阻断合并"
            echo "boundary_pass=false" >> $GITHUB_OUTPUT
            echo "coverage=0.0" >> $GITHUB_OUTPUT
            exit 1
          fi
          # 解析 JSON 字段
          TOTAL=$(echo "$JSON_OUTPUT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_tests',0))")
          BOUNDARY=$(echo "$JSON_OUTPUT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_boundary_tests',0))")
          STATUS=$(echo "$JSON_OUTPUT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('overall_status','unknown'))")
          if [ "$TOTAL" = "0" ] || [ -z "$TOTAL" ]; then
            echo "❌ total_tests=0，无测试用例，阻断合并"
            echo "boundary_pass=false" >> $GITHUB_OUTPUT
            echo "coverage=0.0" >> $GITHUB_OUTPUT
            exit 1
          fi
          COVERAGE=$(python -c "print(round($BOUNDARY / $TOTAL * 100, 1))")
          echo "边界测试覆盖率: ${COVERAGE}% (total=$TOTAL, boundary=$BOUNDARY, status=$STATUS)"
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "total_tests=$TOTAL" >> $GITHUB_OUTPUT
          echo "boundary_tests=$BOUNDARY" >> $GITHUB_OUTPUT
          echo "overall_status=$STATUS" >> $GITHUB_OUTPUT
          # 阈值检查：低于 5% 阻断合并
          THRESHOLD=5
          PASS=$(python -c "print(1 if $COVERAGE >= $THRESHOLD else 0)")
          if [ "$PASS" = "0" ]; then
            echo "❌ 边界测试覆盖率 ${COVERAGE}% 低于阈值 ${THRESHOLD}%，阻断合并"
            echo "boundary_pass=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "✅ 边界测试覆盖率 ${COVERAGE}% 达标（阈值 ${THRESHOLD}%）"
          echo "boundary_pass=true" >> $GITHUB_OUTPUT
        continue-on-error: false

      - name: 上传边界覆盖报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: boundary-coverage-report
          path: |
            docs/observability/boundary_coverage_report.md
            docs/observability/boundary_coverage_report.json
          retention-days: 30

      - name: PR 评论：边界覆盖摘要（含告警）
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'docs/observability/boundary_coverage_report.md';
            const coverage = '${{ steps.boundary_threshold.outputs.coverage }}';
            const totalTests = '${{ steps.boundary_threshold.outputs.total_tests }}';
            const boundaryTests = '${{ steps.boundary_threshold.outputs.boundary_tests }}';
            const boundaryPass = '${{ steps.boundary_threshold.outputs.boundary_pass }}';
            const threshold = 5;

            let body = '## 🛡️ 边界覆盖扫描报告\n\n';

            // 覆盖率告警横幅：低于阈值时醒目提示
            if (boundaryPass === 'false') {
              body += `> ⚠️ **告警：边界测试覆盖率 ${coverage}% 低于阈值 ${threshold}%，已阻断合并**\n\n`;
            } else {
              body += `> ✅ **边界测试覆盖率 ${coverage}% 达标（阈值 ${threshold}%）**\n\n`;
            }

            // 覆盖率摘要表格
            body += '| 指标 | 数值 |\n| --- | --- |\n';
            body += `| 边界测试覆盖率 | ${coverage}% (阈值 ≥${threshold}%) |\n`;
            body += `| 边界测试用例数 | ${boundaryTests} |\n`;
            body += `| 总测试用例数 | ${totalTests} |\n\n`;

            if (fs.existsSync(reportPath)) {
              const content = fs.readFileSync(reportPath, 'utf8');
              // 截取前 4000 字符避免评论过长
              body += content.length > 4000 ? content.slice(0, 4000) + '\n\n...（完整报告见 Artifact）' : content;
            } else {
              body += '报告未生成，请检查 CI 日志。';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ============================================================================
  # 阶段6：契约测试（新增）
  # 验证 3 个核心 API（/api/chat, /api/health, /api/dashboard）的契约一致性
  # ============================================================================
  contract-test:
    name: Pact 契约测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock pytest-asyncio
          pip install requests pyyaml
          pip install -e .

      - name: 运行契约结构测试
        run: |
          echo "=== 契约结构测试 ==="
          python -m pytest tests/contract/ -v --tb=short

      - name: 验证 Provider 契约（条件执行）
        env:
          PROVIDER_BASE_URL: ${{ secrets.PROVIDER_BASE_URL }}
        run: |
          echo "=== Provider 契约验证 ==="
          if [ -z "$PROVIDER_BASE_URL" ]; then
            echo "⚠️ 未配置 PROVIDER_BASE_URL，跳过 Provider 验证（仅 Consumer 侧测试）"
          else
            python tests/contract/verify_provider.py --provider-url "$PROVIDER_BASE_URL"
          fi

      - name: 上传契约测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: |
            tests/contract/contracts/
            tests/contract/verification/
          retention-days: 30

  # ============================================================================
  # 阶段7：全项目测试覆盖率（新增）
  # 运行全量测试生成完整 coverage.xml，供 visibility-report job 消费
  # 替代原"coverage.xml 缺失时降级到 pyproject.toml fail_under"的权宜方案
  #
  # 设计要点：
  #   - 不设 --cov-fail-under：本 job 仅负责生成 coverage.xml，覆盖率阻断
  #     由 visibility-report job 的 test_coverage 指标阈值（40%）统一负责
  #   - 同时测量 agent/ 和 scripts/ 两个源目录，确保 scripts/test_quality_assess.py
  #     等以 test_ 开头的脚本模块也被纳入全项目覆盖率统计
  #   - 上传 coverage.xml 为 artifact（full-coverage-report），visibility-report
  #     job 下载后直接读取真实 line-rate，不再降级
  # ============================================================================
  full-project-tests:
    name: 全项目测试覆盖率
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock pytest-asyncio
          pip install prometheus-client opentelemetry-api opentelemetry-sdk
          pip install -e .

      - name: 运行全量测试并生成覆盖率报告
        run: |
          echo "=== 运行全量测试（agent + scripts）==="
          # --cov=agent --cov=scripts：同时测量两个源目录
          # --cov-report=xml：生成 coverage.xml 供 visibility-report 消费
          # --cov-report=term-missing：控制台显示未覆盖行号便于排查
          # 不设 --cov-fail-under：阻断交由 visibility-report 的 test_coverage 阈值
          python -m pytest tests/ \
            --cov=agent \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: 校验 coverage.xml 有效性
        run: |
          echo "=== 校验 coverage.xml ==="
          if [ ! -f coverage.xml ]; then
            echo "❌ coverage.xml 未生成，全项目测试可能失败"
            exit 1
          fi
          LINE_RATE=$(python -c "import xml.etree.ElementTree as ET; r=ET.parse('coverage.xml').getroot(); print(r.attrib.get('line-rate', '0'))")
          echo "全项目 line-rate: $LINE_RATE"
          # line-rate=0 通常表示测试未覆盖任何行（异常状态），需告警但不阻断
          # 阻断由 visibility-report 的 test_coverage 阈值（40%）负责
          if [ "$LINE_RATE" = "0" ]; then
            echo "⚠️ coverage.xml line-rate=0，可能测试未执行或未覆盖任何行"
          fi

      - name: 上传全项目覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-coverage-report
          path: |
            coverage.xml
            .coverage
          retention-days: 30

  # ============================================================================
  # 阶段8：四层可见性报告（新增，作为 PR 合并门槛）
  # 汇总运行时/验证过程/业务价值/架构影响四层可见性指标，低于阈值时阻断
  #
  # ── 可见性改造基线数据（2026-06-26 更新） ──
  # 详细报告：docs/observability/visibility_improvement_summary.md
  #
  # P0 阻断指标（全部达标）：
  #   D2 structured_log_coverage: 21.4% → 40.5%（阈值 ≥30%，+19.1pp）
  #   D3 trace_coverage:          17.8% → 55.3%（阈值 ≥30%，+37.5pp）
  #   D5 track_event_coverage:     7.4% → 37.0%（阈值 ≥30%，+29.6pp）
  #
  # 改造内容：
  #   - 16 个路由文件 93 处 @trace_route/@log_request 装饰器顺序交换
  #   - routes_chat.py / routes_dashboard.py 新增多阶段日志（entry/exit + trace_id_changed）
  #   - 前端 7 个文件 20 处 trackEvent 埋点（7 个事件类型）
  #   - 新增测试：test_trace_coverage.py(16用例) + App.test.tsx(3用例) + observability.test.ts(11用例)
  #
  # 未达标项（非 P0）：
  #   boundary_test_coverage: 0.0%（阈值 ≥5%，属"验证过程可见"层）
  # ============================================================================
  visibility-report:
    name: 四层可见性报告
    runs-on: ubuntu-latest
    needs: [boundary-coverage-check, contract-test, observability-unit-tests, full-project-tests]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      # ── 下载全项目覆盖率 artifact（来自 full-project-tests job）──
      # 替代原"coverage.xml 缺失时降级到 pyproject.toml fail_under"的权宜方案
      # visibility_report.py 现直接读取真实 line-rate，不再降级
      - name: 下载全项目覆盖率报告
        uses: actions/download-artifact@v4
        with:
          name: full-coverage-report
          path: .

      - name: 校验 coverage.xml 真实覆盖率
        run: |
          echo "=== 校验 coverage.xml（来自 full-project-tests artifact）==="
          if [ ! -f coverage.xml ]; then
            echo "❌ coverage.xml 未从 artifact 下载到位，visibility-report 无法使用真实覆盖率"
            echo "   请检查 full-project-tests job 是否成功执行并上传 artifact"
            exit 1
          fi
          LINE_RATE=$(python -c "import xml.etree.ElementTree as ET; r=ET.parse('coverage.xml').getroot(); print(r.attrib.get('line-rate', '0'))")
          COVERAGE_PERCENT=$(python -c "print(round(float('$LINE_RATE') * 100, 1))")
          echo "✅ coverage.xml 已就位，真实 line-rate=$LINE_RATE (${COVERAGE_PERCENT}%)"
          echo "   visibility_report.py 将直接使用此真实覆盖率，不再降级到 pyproject.toml"

      - name: 生成四层可见性报告
        id: visibility
        run: |
          echo "=== 生成四层可见性报告 ==="
          python scripts/visibility_report.py \
            --config config.yaml \
            --output docs/observability/visibility_report.md \
            --verbose
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "可见性报告退出码: $EXIT_CODE"
          exit $EXIT_CODE
        continue-on-error: true

      - name: 上传可见性报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visibility-report
          path: |
            docs/observability/visibility_report.md
            docs/observability/visibility_report.json
          retention-days: 30

      - name: PR 评论：可见性报告摘要
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'docs/observability/visibility_report.md';
            let body = '## 📊 四层可见性覆盖报告\n\n';
            if (fs.existsSync(reportPath)) {
              const content = fs.readFileSync(reportPath, 'utf8');
              body += content.length > 6000 ? content.slice(0, 6000) + '\n\n...（完整报告见 Artifact）' : content;
            } else {
              body += '⚠️ 报告未生成，请检查 CI 日志。可能为降级报告。';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: 可见性阈值阻断
        if: steps.visibility.outputs.exit_code == '1'
        run: |
          echo "❌ 四层可见性阈值未达标，阻断合并"
          exit 1

  # ============================================================================
  # 阶段8：部署前质量门禁
  # ============================================================================
  observability-quality-gate:
    name: 可观测性质量门禁
    runs-on: ubuntu-latest
    needs:
      - observability-config-validation
      - observability-unit-tests
      - observability-integration-tests
      - observability-e2e-validation
      - boundary-coverage-check
      - contract-test
      - visibility-report
    if: always() && (github.event_name == 'push' || github.event_name == 'schedule')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 下载所有验证结果
        uses: actions/download-artifact@v4
        with:
          path: all-observability-results/

      - name: 执行质量门禁检查
        run: |
          echo "=== 执行可观测性质量门禁检查 ==="
          python scripts/observability_quality_gate.py \
            --results-dir all-observability-results/ \
            --min-unit-test-pass-rate 95 \
            --min-coverage 60 \
            --require-e2e-pass true

      - name: 上传质量门禁报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: observability-quality-gate-report
          path: quality_gate_report.json
          retention-days: 90

  # ============================================================================
  # 阶段9：告警通知
  # ============================================================================
  observability-alert-notification:
    name: 可观测性告警通知
    runs-on: ubuntu-latest
    needs: [observability-quality-gate]
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备通知内容
        id: notify
        run: |
          echo "=== 准备通知内容 ==="
          STATUS="${{ needs.observability-quality-gate.result }}"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          
          if [ "$STATUS" = "success" ]; then
            echo "message=✅ 可观测性质量门禁通过 - 所有检查项均达标" >> $GITHUB_OUTPUT
            echo "color=#36a64f" >> $GITHUB_OUTPUT
          else
            echo "message=❌ 可观测性质量门禁失败 - 请检查相关报告" >> $GITHUB_OUTPUT
            echo "color=#ff0000" >> $GITHUB_OUTPUT
          fi

      - name: 发送 Slack 通知
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "${{ steps.notify.outputs.message }}",
              "attachments": [{
                "color": "${{ steps.notify.outputs.color }}",
                "title": "可观测性 CI/CD 结果",
                "fields": [
                  {"title": "状态", "value": "${{ steps.notify.outputs.status }}", "short": true},
                  {"title": "分支", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "提交", "value": "${{ github.sha }}", "short": true},
                  {"title": "触发者", "value": "${{ github.actor }}", "short": true},
                  {"title": "工作流", "value": "${{ github.workflow }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: 发送钉钉通知
        if: always() && env.DINGTALK_WEBHOOK != ''
        run: |
          echo "=== 发送钉钉通知 ==="
          python scripts/observability_dingtalk_notify.py \
            --webhook "${{ secrets.DINGTALK_WEBHOOK }}" \
            --secret "${{ secrets.DINGTALK_SECRET }}" \
            --status "${{ steps.notify.outputs.status }}" \
            --message "${{ steps.notify.outputs.message }}" \
            --branch "${{ github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --actor "${{ github.actor }}"
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        continue-on-error: true
