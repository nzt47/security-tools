# 关键字参数冲突扫描 CI 工作流（Docker 镜像版）
#
# 使用预构建的 kwarg-scanner Docker 镜像，无需安装 Python 依赖。
# 适用于跨项目复用、CI 环境隔离、以及非 Python 主项目的场景。
#
# 镜像构建: docker build -t kwarg-scanner:latest ./packages/kwarg_scanner
# 镜像推送: docker push ghcr.io/yunshu/kwarg-scanner:latest

name: 关键字参数冲突扫描 (Docker)

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      min_risk:
        description: '最低风险等级 (LOW/MEDIUM/HIGH)'
        required: false
        default: 'HIGH'
        type: choice
        options:
          - HIGH
          - MEDIUM
          - LOW
      scan_path:
        description: '扫描路径'
        required: false
        default: 'agent/'
        type: string

env:
  # 镜像地址（优先使用 GHCR，回退到本地构建）
  SCANNER_IMAGE: ghcr.io/yunshu/kwarg-scanner:latest
  # 若 GHCR 镜像不可用，设置为 true 触发本地构建
  BUILD_LOCALLY: 'true'

jobs:
  # ============================================================================
  # 镜像准备: 登录 GHCR 或本地构建
  # ============================================================================
  prepare-image:
    name: 准备扫描器镜像
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.decide.outputs.image }}
      built_locally: ${{ steps.decide.outputs.built_locally }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 决定镜像来源
        id: decide
        run: |
          if [ "${{ env.BUILD_LOCALLY }}" = "true" ]; then
            echo "image=kwarg-scanner:local" >> $GITHUB_OUTPUT
            echo "built_locally=true" >> $GITHUB_OUTPUT
            echo "选择本地构建镜像"
          else
            echo "image=${{ env.SCANNER_IMAGE }}" >> $GITHUB_OUTPUT
            echo "built_locally=false" >> $GITHUB_OUTPUT
            echo "使用 GHCR 预构建镜像"
          fi

      - name: 本地构建镜像
        if: steps.decide.outputs.built_locally == 'true'
        run: |
          echo "=== 构建 kwarg-scanner 镜像 ==="
          docker build \
            -t kwarg-scanner:local \
            -t kwarg-scanner:${{ github.sha }} \
            ./packages/kwarg_scanner
          echo "✓ 镜像构建完成"
          docker images kwarg-scanner

      - name: 登录 GHCR（仅远程镜像模式）
        if: steps.decide.outputs.built_locally == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 镜像健康检查
        run: |
          echo "=== 镜像健康检查 ==="
          docker run --rm ${{ steps.decide.outputs.image }} --health
          echo "✓ 镜像健康检查通过"

      - name: 显示镜像版本
        run: |
          docker run --rm ${{ steps.decide.outputs.image }} --version

  # ============================================================================
  # HIGH 风险扫描（阻断式）
  # ============================================================================
  high-risk-scan:
    name: HIGH 风险扫描 (Docker, 阻断)
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 本地构建镜像（如需）
        if: needs.prepare-image.outputs.built_locally == 'true'
        run: |
          docker build -t kwarg-scanner:local ./packages/kwarg_scanner

      - name: 运行 HIGH 风险扫描
        id: scan
        run: |
          echo "=== Docker 容器内运行 HIGH 风险扫描 ==="
          # 挂载工作区到 /project，容器内扫描 /project/agent
          # 结构化日志输出到 stderr，扫描报告输出到 stdout
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -e MIN_RISK=HIGH \
            -e OUTPUT_FORMAT=json \
            -e OUTPUT_FILE=/project/kwarg-high-risk-report.json \
            -e ENABLE_LOGGING=true \
            ${{ needs.prepare-image.outputs.image }} \
            --path /project/agent 2>&1 | tee docker-scan-high.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: 判断扫描结果
        if: steps.scan.outputs.exit_code != '0'
        run: |
          echo "::error::Docker 扫描检测到 HIGH 风险，CI 已阻断 (exit=${{ steps.scan.outputs.exit_code }})"
          echo "::error::查看报告: kwarg-high-risk-report.json"
          echo "::error::修复提示: 在 **kwargs 展开前过滤保留键，使用 safe_ 前缀命名变量"
          exit 1

      - name: 上传 HIGH 风险报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kwarg-docker-high-risk-report
          path: |
            kwarg-high-risk-report.json
            docker-scan-high.log
          retention-days: 30

      - name: 扫描通过
        if: success()
        run: echo "✓ Docker HIGH 风险扫描通过"

  # ============================================================================
  # MEDIUM 风险扫描（非阻断，仅提醒）
  # ============================================================================
  medium-risk-scan:
    name: MEDIUM 风险扫描 (Docker, 提醒)
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 本地构建镜像（如需）
        if: needs.prepare-image.outputs.built_locally == 'true'
        run: |
          docker build -t kwarg-scanner:local ./packages/kwarg_scanner

      - name: 运行 MEDIUM 风险扫描
        run: |
          echo "=== Docker 容器内运行 MEDIUM 风险扫描 ==="
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -e MIN_RISK=MEDIUM \
            -e OUTPUT_FORMAT=json \
            -e OUTPUT_FILE=/project/kwarg-medium-risk-report.json \
            -e ENABLE_LOGGING=true \
            ${{ needs.prepare-image.outputs.image }} \
            --path /project/agent 2>&1 | tee docker-scan-medium.log || true

      - name: 统计 MEDIUM 风险数量
        run: |
          if [ -f kwarg-medium-risk-report.json ]; then
            COUNT=$(python3 -c "
              import json
              with open('kwarg-medium-risk-report.json') as f:
                d = json.load(f)
              print(d.get('summary', {}).get('MEDIUM', 0))
            " 2>/dev/null || echo "0")
            echo "medium_count=$COUNT" >> $GITHUB_ENV
            if [ "$COUNT" -gt 0 ]; then
              echo "::warning::检测到 $COUNT 处 MEDIUM 级别风险（不阻断，建议审查）"
            else
              echo "✓ 无 MEDIUM 级别风险"
            fi
          fi

      - name: 上传 MEDIUM 风险报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kwarg-docker-medium-risk-report
          path: |
            kwarg-medium-risk-report.json
            docker-scan-medium.log
          retention-days: 30

  # ============================================================================
  # 手动触发的自定义扫描
  # ============================================================================
  custom-scan:
    name: 自定义扫描 (手动触发)
    runs-on: ubuntu-latest
    needs: prepare-image
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 本地构建镜像（如需）
        if: needs.prepare-image.outputs.built_locally == 'true'
        run: |
          docker build -t kwarg-scanner:local ./packages/kwarg_scanner

      - name: 运行自定义扫描
        run: |
          echo "=== 自定义扫描 ==="
          echo "路径: ${{ inputs.scan_path }}"
          echo "最低风险: ${{ inputs.min_risk }}"
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -e MIN_RISK=${{ inputs.min_risk }} \
            -e OUTPUT_FORMAT=text \
            ${{ needs.prepare-image.outputs.image }} \
            --path /project/${{ inputs.scan_path }}

      - name: 扫描结果
        run: |
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ 自定义扫描通过"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "::warning::自定义扫描发现风险 (exit=$EXIT_CODE)"
          else
            echo "::error::自定义扫描出错 (exit=$EXIT_CODE)"
            exit 1
          fi
