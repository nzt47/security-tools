# 云枢告警规则（已清理）
#
# 维护说明：
#   - 所有告警规则必须基于 /metrics 端点实际暴露的指标
#   - 实际暴露的 yunshu_* 指标由 app_server.py 注册到 prometheus_client 默认注册表
#   - 已删除依赖未部署组件（cAdvisor / node_exporter / Alertmanager）的告警
#   - 已删除依赖未暴露业务指标（yunshu_health_score / yunshu_*_deployment_* / yunshu_ci_*）的告警
#   - yunshu_memory_mb_used 录制规则已移至 recording_rules.yml
#
# 历史清理记录：2026-06-25 移除 22 条无效告警，修复 8 条告警 PromQL

groups:
  - name: yunshu_service_health
    interval: 30s
    rules:
      - alert: YunshuServiceDown
        expr: up{job="yunshu-app"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
          service: yunshu
        annotations:
          summary: "云枢服务不可用"
          description: "服务实例 {{ $labels.instance }} 已停止运行超过 1 分钟"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#服务不可用"
          impact: "用户无法使用云枢服务"
          action: "检查容器状态，查看应用日志，必要时重启服务"

      - alert: YunshuServiceRestart
        # 修复说明：原 yunshu_service_restart_total 指标未暴露，改用 up 指标在 1 小时内的状态重置次数
        expr: resets(up{job="yunshu-app"}[1h]) > 3
        for: 0m
        labels:
          severity: warning
          category: availability
          service: yunshu
        annotations:
          summary: "服务频繁重启"
          description: "过去 1 小时服务发生 {{ $value | printf \"%.0f\" }} 次状态重置"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#服务频繁重启"
          impact: "服务可用性受影响"
          action: "检查崩溃日志，分析重启原因"

  - name: yunshu_http_errors
    interval: 30s
    rules:
      - alert: YunshuHighErrorRate
        # 修复说明：原 yunshu:error_rate:5m 录制规则依赖未注册的 yunshu_error_total
        # 改用 prometheus_flask_exporter 暴露的 yunshu_http_request_total 直接计算 5xx 错误率
        expr: |
          sum(rate(yunshu_http_request_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(yunshu_http_request_total[5m])), 1e-9)
          > 0.05
        for: 5m
        labels:
          severity: warning
          category: errors
          service: yunshu
        annotations:
          summary: "HTTP 5xx 错误率过高"
          description: "过去 5 分钟 5xx 错误率为 {{ $value | printf \"%.2f\" }}，超过阈值 5%"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#错误率过高"
          impact: "用户体验下降"
          action: "查看错误日志，分析错误类型，定位问题模块"

      - alert: YunshuCriticalHTTPErrors
        # 修复说明：原 YunshuCriticalErrors 依赖未注册的 yunshu_error_total
        # 改用 yunshu_http_request_total 检测 1 分钟内 5xx 错误爆发
        expr: sum(increase(yunshu_http_request_total{status=~"5.."}[1m])) > 10
        for: 1m
        labels:
          severity: critical
          category: errors
          service: yunshu
        annotations:
          summary: "HTTP 5xx 错误爆发"
          description: "过去 1 分钟发生 {{ $value | printf \"%.0f\" }} 次 5xx 错误"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#严重错误"
          impact: "核心功能可能受影响"
          action: "立即查看错误堆栈，评估影响范围"

  - name: yunshu_latency
    interval: 30s
    rules:
      - alert: YunshuHighLatencyP99
        # 修复说明：原 yunshu:latency_p99:5m 录制规则依赖未注册的 yunshu_interaction_duration_duration_seconds
        # 改用 prometheus_flask_exporter 暴露的 yunshu_http_request_duration_seconds_bucket 直接计算
        expr: |
          histogram_quantile(0.99,
            sum(rate(yunshu_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 3
        for: 5m
        labels:
          severity: warning
          category: performance
          service: yunshu
        annotations:
          summary: "P99 响应时间过高"
          description: "P99 响应时间为 {{ $value | printf \"%.2f\" }} 秒，超过阈值 3 秒"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#响应时间过高"
          impact: "用户体验下降"
          action: "分析性能瓶颈，检查数据库查询、外部 API 调用"

      - alert: YunshuHighLatencyP95
        # 修复说明：同 YunshuHighLatencyP99，使用实际暴露的 histogram 指标
        expr: |
          histogram_quantile(0.95,
            sum(rate(yunshu_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 5
        for: 10m
        labels:
          severity: info
          category: performance
          service: yunshu
        annotations:
          summary: "P95 响应缓慢"
          description: "P95 响应时间为 {{ $value | printf \"%.2f\" }} 秒"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#响应缓慢"
          impact: "部分用户体验下降"
          action: "监控性能趋势，排查慢查询"

  - name: yunshu_resources
    interval: 30s
    rules:
      - alert: YunshuHighMemoryUsage
        # 修复说明：原 yunshu:memory_usage_percent 录制规则依赖未注册的 yunshu_memory_count / yunshu_memory_limit
        # 改用 app_server.py 直接暴露的 yunshu_memory_usage_percent Gauge（psutil 0-100 范围）
        expr: yunshu_memory_usage_percent > 85
        for: 5m
        labels:
          severity: warning
          category: resources
          service: yunshu
        annotations:
          summary: "内存使用率过高"
          description: "内存使用率为 {{ $value | printf \"%.2f\" }}%，超过 85%"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#内存使用率过高"
          impact: "可能导致 OOM，服务中断"
          action: "检查内存泄漏，考虑增加内存或优化内存使用"

      - alert: YunshuHighCPUUsage
        # 修复说明：原 PromQL 计算方式不准确（仅适用单核 CPU）
        # 改用 app_server.py 直接暴露的 yunshu_cpu_usage_percent Gauge（psutil 0-100 范围）
        expr: yunshu_cpu_usage_percent > 80
        for: 10m
        labels:
          severity: warning
          category: resources
          service: yunshu
        annotations:
          summary: "CPU 使用率过高"
          description: "CPU 使用率超过 80% 持续 10 分钟"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#CPU使用率过高"
          impact: "响应延迟增加"
          action: "分析 CPU 热点，优化算法或增加实例"

  - name: yunshu_business
    interval: 30s
    rules:
      - alert: YunshuLLMCallSpike
        # 修复说明：原 YunshuTokenUsageHigh 依赖未暴露的 yunshu:cost_per_hour
        # 改用 yunshu_llm_calls_total 检测 LLM 调用频率异常（每小时调用超过 1000 次）
        expr: sum(increase(yunshu_llm_calls_total[1h])) > 1000
        for: 10m
        labels:
          severity: warning
          category: cost
          service: yunshu
        annotations:
          summary: "LLM 调用频率过高"
          description: "过去 1 小时 LLM 调用 {{ $value | printf \"%.0f\" }} 次，超过 1000 次"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#Token消耗过高"
          impact: "运营成本增加"
          action: "分析使用模式，优化 Prompt 长度，考虑缓存策略"

      - alert: YunshuToolFailureRate
        # 修复说明：app_server.py 的 yunshu_tool_calls_total（复数）未实际埋点
        # 改用 business_metrics.py 通过 /api/business/prometheus 暴露的 yunshu_tool_call_total（单数）
        # 注意：label 名为 success（非 status），值为 Python 风格 "True"/"False"
        expr: |
          1 - (
            sum(rate(yunshu_tool_call_total{success="True"}[5m]))
            /
            clamp_min(sum(rate(yunshu_tool_call_total[5m])), 1e-9)
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          category: quality
          service: yunshu
        annotations:
          summary: "工具调用失败率过高"
          description: "工具调用失败率超过 10%"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#工具调用失败"
          impact: "用户任务完成率下降"
          action: "检查工具实现，排查外部依赖"

  - name: yunshu_security
    interval: 30s
    rules:
      - alert: YunshuSecurityBlockCritical
        # 修复说明：原 YunshuSecurityAlertCritical 依赖未注册的 yunshu_alert_total
        # 改用 app_server.py 直接暴露的 yunshu_security_blocks_total{level="critical"}
        expr: sum(increase(yunshu_security_blocks_total{level="critical"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
          category: security
          service: yunshu
        annotations:
          summary: "严重安全拦截"
          description: "过去 5 分钟检测到 {{ $value | printf \"%.0f\" }} 次严重安全拦截"
          runbook_url: "docs/handover/EMERGENCY_PLAN.md#安全事件"
          impact: "系统安全可能受威胁"
          action: "立即调查告警来源，启动安全响应流程"

  - name: yunshu_monitoring
    interval: 30s
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 5m
        labels:
          severity: critical
          category: monitoring
        annotations:
          summary: "Prometheus 不可用"
          description: "Prometheus 实例已停止运行超过 5 分钟"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#Prometheus不可用"
          impact: "监控系统失效，无法检测其他告警"
          action: "检查 Prometheus 状态，查看日志"

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 5m
        labels:
          severity: warning
          category: monitoring
        annotations:
          summary: "Grafana 不可用"
          description: "Grafana 实例已停止运行超过 5 分钟"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#Grafana不可用"
          impact: "可视化仪表盘不可用"
          action: "检查 Grafana 状态，查看日志"

  # ════════════════════════════════════════════════════════════
  # 技能质量与幻觉告警组
  # 指标来源: agent.skills_mgmt.observability.emit_eval_score_metric
  #   - yunshu_skill_hallucination_total (counter, labels={skill_id})
  #   - yunshu_skill_eval_score (histogram, labels={skill_id, task_success})
  # ════════════════════════════════════════════════════════════
  - name: yunshu_skill_quality
    interval: 30s
    rules:
      - alert: YunshuSkillHallucinationSpike
        # 5 分钟内幻觉次数 ≥ 3 触发 warning（emit_eval_score_metric 在 hallucination_detected=true 时 +1）
        expr: sum(increase(yunshu_skill_hallucination_total[5m])) >= 3
        for: 1m
        labels:
          severity: warning
          category: quality
          service: yunshu
        annotations:
          summary: "技能幻觉率突增"
          description: "过去 5 分钟检测到 {{ $value | printf \"%.0f\" }} 次技能幻觉，超过阈值 3 次"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#技能幻觉"
          impact: "技能输出可能不可靠，影响用户信任"
          action: "检查 eval_score 异常的 skill_id，复核 instruction 是否清晰，必要时禁用技能"

      - alert: YunshuSkillHallucinationCritical
        # 5 分钟内幻觉次数 ≥ 10 触发 critical（立即触发，for: 0m）
        expr: sum(increase(yunshu_skill_hallucination_total[5m])) >= 10
        for: 0m
        labels:
          severity: critical
          category: quality
          service: yunshu
        annotations:
          summary: "技能幻觉率严重超标"
          description: "过去 5 分钟检测到 {{ $value | printf \"%.0f\" }} 次技能幻觉，超过阈值 10 次"
          runbook_url: "docs/handover/EMERGENCY_PLAN.md#技能幻觉严重超标"
          impact: "技能系统输出严重不可靠，可能导致用户决策错误"
          action: "立即检查 hallucination_detected=true 的技能，考虑临时禁用相关技能"

      - alert: YunshuSkillEvalScoreLow
        # 1 小时内 P50 eval_score < 0.5 持续 10 分钟触发 warning
        # 基于 yunshu_skill_eval_score histogram 的 _bucket 后缀指标计算分位数
        expr: histogram_quantile(0.5, sum(rate(yunshu_skill_eval_score_bucket[1h])) by (le)) < 0.5
        for: 10m
        labels:
          severity: warning
          category: quality
          service: yunshu
        annotations:
          summary: "技能评估分数 P50 过低"
          description: "过去 1 小时技能评估分数 P50 为 {{ $value | printf \"%.2f\" }}，低于阈值 0.5"
          runbook_url: "docs/handover/TROUBLESHOOTING.md#技能评估分数低"
          impact: "技能整体质量下降"
          action: "分析低分技能的 instruction 与检索召回，优化技能定义"
