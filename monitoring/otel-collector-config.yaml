receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

  zipkin:
    endpoint: "0.0.0.0:9411"

  jaeger:
    protocols:
      grpc:
        endpoint: "0.0.0.0:14250"
      thrift_http:
        endpoint: "0.0.0.0:14268"

processors:
  batch:
    timeout: 10s
    send_batch_size: 100
    send_batch_max_size: 1000

  memory_limiter:
    check_interval: 1s
    limit_mib: 4000
    spike_limit_mib: 800

  sampling:
    traces:
      probabilistic:
        sampling_percentage: 100

  attributes:
    actions:
      - key: "service.name"
        action: upsert
        value: "yunshu-agent"

exporters:
  jaeger:
    endpoint: "jaeger:14250"
    tls:
      insecure: true

  zipkin:
    endpoint: "http://zipkin:9411/api/v2/spans"

  logging:
    loglevel: debug

  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp, zipkin, jaeger]
      processors: [memory_limiter, batch, sampling, attributes]
      exporters: [jaeger, logging]