<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云枢智能体 - 可视化仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #4F46E5;
            --success-color: #10B981;
            --warning-color: #F59E0B;
            --error-color: #EF4444;
            --info-color: #3B82F6;
            --dark-bg: #0F172A;
            --card-bg: #1E293B;
            --border-color: #334155;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .dashboard-container {
            min-height: 100vh;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab {
            padding: 10px 20px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .tab:hover {
            background-color: rgba(79, 70, 229, 0.1);
            border-color: var(--primary-color);
        }

        .tab.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .time-range-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .time-btn {
            padding: 8px 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .time-btn:hover {
            border-color: var(--primary-color);
        }

        .time-btn.active {
            background-color: rgba(79, 70, 229, 0.2);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title svg {
            width: 18px;
            height: 18px;
        }

        .card-body {
            min-height: 200px;
        }

        .chart-container {
            width: 100%;
            height: 250px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stat-card {
            text-align: center;
        }

        .stat-card.success .stat-value { color: var(--success-color); }
        .stat-card.warning .stat-value { color: var(--warning-color); }
        .stat-card.error .stat-value { color: var(--error-color); }
        .stat-card.info .stat-value { color: var(--info-color); }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            color: var(--text-primary);
        }

        tr:hover td {
            background-color: rgba(79, 70, 229, 0.1);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-success {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--success-color);
        }

        .status-error {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--error-color);
        }

        .progress-bar {
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .progress-fill.success { background-color: var(--success-color); }
        .progress-fill.warning { background-color: var(--warning-color); }
        .progress-fill.error { background-color: var(--error-color); }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: border-color 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-box svg {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
        }

        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .detail-modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 12px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 8px;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
        }

        .span-tree {
            margin-left: 20px;
            border-left: 2px solid var(--border-color);
            padding-left: 15px;
        }

        .span-item {
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            position: relative;
        }

        .span-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 20px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--primary-color);
            border: 2px solid var(--card-bg);
        }

        .span-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .span-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .span-duration {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .span-duration.warning { color: var(--warning-color); }
        .span-duration.error { color: var(--error-color); }

        .span-meta {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .span-attributes {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
        }

        .attr-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }

        .attr-name { color: var(--text-secondary); }
        .attr-value { color: var(--text-primary); }

        .refresh-btn {
            padding: 8px 16px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background-color: #4338CA;
        }

        .refresh-btn svg {
            width: 14px;
            height: 14px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .last-update {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .chart-container {
                height: 200px;
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .dashboard-container {
                padding: 12px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .tab {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px;">
                <div>
                    <h1>云枢智能体仪表盘</h1>
                    <p class="subtitle">实时监控质量指标、链路追踪与内存使用</p>
                </div>
                <div class="header-actions">
                    <span class="last-update" id="lastUpdate">最后更新: --</span>
                    <button class="refresh-btn" onclick="refreshAllData()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        刷新
                    </button>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('quality')">质量监控</button>
            <button class="tab" onclick="switchTab('traces')">链路追踪</button>
            <button class="tab" onclick="switchTab('memory')">Memory 使用</button>
        </div>

        <div id="qualityTab" class="tab-content">
            <div class="time-range-selector">
                <button class="time-btn active" onclick="changeTimeRange('today')">今日</button>
                <button class="time-btn" onclick="changeTimeRange('week')">本周</button>
                <button class="time-btn" onclick="changeTimeRange('month')">本月</button>
            </div>

            <div class="metrics-grid">
                <div class="card stat-card success">
                    <div class="stat-value" id="schemaPassRate">--</div>
                    <div class="stat-label">Schema 校验通过率</div>
                    <div class="progress-bar"><div class="progress-fill success" id="schemaProgress"></div></div>
                </div>
                <div class="card stat-card info">
                    <div class="stat-value" id="criticScore">--</div>
                    <div class="stat-label">Critic 平均评分</div>
                    <div class="progress-bar"><div class="progress-fill info" id="criticProgress"></div></div>
                </div>
                <div class="card stat-card warning">
                    <div class="stat-value" id="totalFailures">--</div>
                    <div class="stat-label">失败总数</div>
                </div>
                <div class="card stat-card error">
                    <div class="stat-value" id="validationCount">--</div>
                    <div class="stat-label">校验总数</div>
                </div>
            </div>

            <div class="grid">
                <div class="card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20V10"></path>
                            <path d="M18 20V4"></path>
                            <path d="M6 20v-6"></path>
                        </svg>
                        Schema 校验趋势
                    </div>
                    <div class="card-body">
                        <div class="chart-container" id="schemaTrendChart"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="16"></line>
                        </svg>
                        Critic 评分趋势
                    </div>
                    <div class="card-body">
                        <div class="chart-container" id="criticTrendChart"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                        失败模式分布
                    </div>
                    <div class="card-body">
                        <div class="chart-container" id="failurePieChart"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        错误排行
                    </div>
                    <div class="card-body" style="min-height: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>错误类型</th>
                                    <th>数量</th>
                                    <th>占比</th>
                                </tr>
                            </thead>
                            <tbody id="errorRanking">
                                <tr><td colspan="3">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="tracesTab" class="tab-content" style="display: none;">
            <div class="search-box">
                <input type="text" id="traceSearch" placeholder="搜索 trace_id..." onkeyup="handleTraceSearch()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
            </div>

            <div class="card">
                <div class="card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20V10"></path>
                        <path d="M18 20V4"></path>
                        <path d="M6 20v-6"></path>
                    </svg>
                    追踪列表
                </div>
                <div class="card-body" style="min-height: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Trace ID</th>
                                <th>服务</th>
                                <th>操作</th>
                                <th>状态</th>
                                <th>耗时</th>
                            </tr>
                        </thead>
                        <tbody id="traceList">
                            <tr><td colspan="5">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14l9 3 9-12h-7"></path>
                    </svg>
                    调用链路图
                </div>
                <div class="card-body">
                    <div class="chart-container" id="traceFlowChart"></div>
                </div>
            </div>
        </div>

        <div id="memoryTab" class="tab-content" style="display: none;">
            <div class="search-box">
                <input type="text" id="memorySearch" placeholder="搜索记忆内容..." onkeyup="handleMemorySearch()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
            </div>

            <div class="metrics-grid">
                <div class="card stat-card success">
                    <div class="stat-value" id="longTermCount">--</div>
                    <div class="stat-label">长期记忆数量</div>
                </div>
                <div class="card stat-card info">
                    <div class="stat-value" id="shortTermCount">--</div>
                    <div class="stat-label">临时记忆数量</div>
                </div>
                <div class="card stat-card warning">
                    <div class="stat-value" id="overallHitRate">--</div>
                    <div class="stat-label">总体命中率</div>
                    <div class="progress-bar"><div class="progress-fill warning" id="hitRateProgress"></div></div>
                </div>
                <div class="card stat-card error">
                    <div class="stat-value" id="memorySize">--</div>
                    <div class="stat-label">记忆总大小 (MB)</div>
                </div>
            </div>

            <div class="grid">
                <div class="card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20V10"></path>
                            <path d="M18 20V4"></path>
                            <path d="M6 20v-6"></path>
                        </svg>
                        长期记忆增长趋势
                    </div>
                    <div class="card-body">
                        <div class="chart-container" id="longTermTrendChart"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                        记忆分类分布
                    </div>
                    <div class="card-body">
                        <div class="chart-container" id="memoryPieChart"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="16"></line>
                        </svg>
                        命中率趋势
                    </div>
                    <div class="card-body">
                        <div class="chart-container" id="hitRateTrendChart"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        最近访问记录
                    </div>
                    <div class="card-body" style="min-height: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>类型</th>
                                    <th>分类</th>
                                    <th>内容</th>
                                    <th>时间</th>
                                </tr>
                            </thead>
                            <tbody id="memoryRecentAccess">
                                <tr><td colspan="4">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="detail-modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>追踪详情</h2>
                <button class="modal-close" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div id="spanTree"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        let currentTab = 'quality';
        let currentTimeRange = 'today';
        let charts = {};

        function initCharts() {
            charts.schemaTrend = echarts.init(document.getElementById('schemaTrendChart'));
            charts.criticTrend = echarts.init(document.getElementById('criticTrendChart'));
            charts.failurePie = echarts.init(document.getElementById('failurePieChart'));
            charts.traceFlow = echarts.init(document.getElementById('traceFlowChart'));
            charts.longTermTrend = echarts.init(document.getElementById('longTermTrendChart'));
            charts.memoryPie = echarts.init(document.getElementById('memoryPieChart'));
            charts.hitRateTrend = echarts.init(document.getElementById('hitRateTrendChart'));
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`button[onclick="switchTab('${tab}')"]`).classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(`${tab}Tab`).style.display = 'block';

            if (tab === 'traces') {
                loadTraces();
            } else if (tab === 'memory') {
                loadMemoryData();
            }
        }

        function changeTimeRange(range) {
            currentTimeRange = range;
            document.querySelectorAll('.time-btn').forEach(t => t.classList.remove('active'));
            document.querySelector(`button[onclick="changeTimeRange('${range}')"]`).classList.add('active');
            loadQualityData();
        }

        async function loadQualityData() {
            try {
                const response = await fetch(`/api/dashboard/quality?time_range=${currentTimeRange}`);
                const data = await response.json();

                updateQualityMetrics(data);
                updateSchemaTrendChart(data.schema_validation);
                updateCriticTrendChart(data.critic_scores);
                updateFailurePieChart(data.failure_distribution);
                updateErrorRanking(data.failure_distribution);

                updateLastUpdate();
            } catch (error) {
                console.error('加载质量数据失败:', error);
            }
        }

        function updateQualityMetrics(data) {
            const schema = data.schema_validation;
            const critic = data.critic_scores;
            const failure = data.failure_distribution;

            document.getElementById('schemaPassRate').textContent = `${schema.pass_rate}%`;
            document.getElementById('schemaProgress').style.width = `${schema.pass_rate}%`;
            
            document.getElementById('criticScore').textContent = critic.average_score;
            document.getElementById('criticProgress').style.width = `${critic.average_score}%`;
            
            document.getElementById('totalFailures').textContent = failure.total_failures;
            document.getElementById('validationCount').textContent = schema.total_validations;
        }

        function updateSchemaTrendChart(data) {
            const option = {
                backgroundColor: 'transparent',
                grid: { top: 20, right: 20, bottom: 30, left: 50 },
                xAxis: {
                    type: 'category',
                    data: data.trend.map(d => d.time),
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94A3B8', fontSize: 10 }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94A3B8', fontSize: 10 }
                },
                series: [
                    { name: '成功', type: 'line', data: data.trend.map(d => d.success), smooth: true, lineStyle: { color: '#10B981' }, itemStyle: { color: '#10B981' } },
                    { name: '失败', type: 'line', data: data.trend.map(d => d.fail), smooth: true, lineStyle: { color: '#EF4444' }, itemStyle: { color: '#EF4444' } }
                ],
                legend: { data: ['成功', '失败'], textStyle: { color: '#94A3B8' }, top: 0, right: 0 }
            };
            charts.schemaTrend.setOption(option);
        }

        function updateCriticTrendChart(data) {
            const option = {
                backgroundColor: 'transparent',
                grid: { top: 20, right: 20, bottom: 30, left: 50 },
                xAxis: {
                    type: 'category',
                    data: data.trend.map(d => d.time),
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94A3B8', fontSize: 10 }
                },
                yAxis: {
                    type: 'value',
                    max: 100,
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94A3B8', fontSize: 10 }
                },
                series: [
                    { name: '平均评分', type: 'line', data: data.trend.map(d => d.avg_score), smooth: true, lineStyle: { color: '#3B82F6', width: 3 }, itemStyle: { color: '#3B82F6' } }
                ],
                markLine: { data: [{ yAxis: 70, lineStyle: { color: '#F59E0B', type: 'dashed' }, label: { formatter: '阈值', color: '#F59E0B' } }] }
            };
            charts.criticTrend.setOption(option);
        }

        function updateFailurePieChart(data) {
            const items = data.top_errors;
            const colors = ['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6', '#EC4899', '#6366F1'];
            
            const option = {
                backgroundColor: 'transparent',
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 8, borderColor: '#1E293B', borderWidth: 2 },
                    label: { show: true, color: '#F8FAFC', fontSize: 11, formatter: '{b}: {c}' },
                    labelLine: { lineStyle: { color: '#94A3B8' } },
                    data: items.map((item, i) => ({ value: item.count, name: item.type, itemStyle: { color: colors[i % colors.length] } }))
                }]
            };
            charts.failurePie.setOption(option);
        }

        function updateErrorRanking(data) {
            const tbody = document.getElementById('errorRanking');
            tbody.innerHTML = data.top_errors.map(e => `
                <tr>
                    <td>${e.type}</td>
                    <td>${e.count}</td>
                    <td>${e.percentage}%</td>
                </tr>
            `).join('');
        }

        async function loadTraces() {
            try {
                const search = document.getElementById('traceSearch').value;
                const url = search ? `/api/dashboard/traces?trace_id=${search}` : '/api/dashboard/traces';
                const response = await fetch(url, { headers: { 'Authorization': 'Bearer test-token' } });
                const data = await response.json();

                updateTraceList(data.traces);
                if (data.traces.length > 0) {
                    loadTraceDetail(data.traces[0].trace_id);
                }
            } catch (error) {
                console.error('加载追踪数据失败:', error);
            }
        }

        function handleTraceSearch() {
            loadTraces();
        }

        function updateTraceList(traces) {
            const tbody = document.getElementById('traceList');
            if (traces.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = traces.map(t => `
                <tr onclick="loadTraceDetail('${t.trace_id}')" style="cursor: pointer;">
                    <td style="font-family: monospace; font-size: 0.8rem;">${t.trace_id}</td>
                    <td>${t.service || '-'}</td>
                    <td>${t.operation || '-'}</td>
                    <td><span class="status-badge status-${t.status === 'success' ? 'success' : 'error'}">${t.status}</span></td>
                    <td>${t.duration_ms}ms</td>
                </tr>
            `).join('');
        }

        async function loadTraceDetail(traceId) {
            try {
                const response = await fetch(`/api/dashboard/traces/${traceId}`, { headers: { 'Authorization': 'Bearer test-token' } });
                const data = await response.json();

                if (data.error) {
                    console.error(data.error);
                    return;
                }

                updateTraceFlowChart(data);
            } catch (error) {
                console.error('加载追踪详情失败:', error);
            }
        }

        function updateTraceFlowChart(data) {
            const spans = data.spans || [];
            const nodes = spans.map((s, i) => ({
                id: s.span_id,
                name: s.name || `${s.service}.${s.operation}`,
                symbolSize: 40 + Math.min(s.duration_ms / 10, 30),
                itemStyle: { color: s.status === 'error' ? '#EF4444' : '#4F46E5' }
            }));

            const edges = spans.filter(s => s.parent_span_id).map(s => ({
                from: s.parent_span_id,
                to: s.span_id,
                lineStyle: { color: '#475569' }
            }));

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: (params) => {
                        if (params.dataType === 'node') {
                            const span = spans.find(s => s.span_id === params.data.id);
                            return `<strong>${params.data.name}</strong><br/>耗时: ${span?.duration_ms || 0}ms<br/>状态: ${span?.status || '-'}`;
                        }
                        return '';
                    }
                },
                series: [{
                    type: 'graph',
                    layout: 'dagre',
                    data: nodes,
                    links: edges,
                    roam: true,
                    draggable: true,
                    label: { show: true, position: 'bottom', color: '#F8FAFC', fontSize: 10 },
                    edgeSymbol: ['none', 'arrow'],
                    edgeSymbolSize: [0, 10],
                    edgeLabel: { fontSize: 8 }
                }]
            };
            charts.traceFlow.setOption(option);
        }

        async function loadMemoryData() {
            try {
                const search = document.getElementById('memorySearch').value;
                const url = search ? `/api/dashboard/memory?search=${search}` : '/api/dashboard/memory';
                const response = await fetch(url);
                const data = await response.json();

                updateMemoryMetrics(data);
                updateLongTermTrendChart(data.long_term);
                updateMemoryPieChart(data.category_distribution);
                updateHitRateTrendChart(data.hit_rate);
                updateMemoryRecentAccess(data.recent_access);

                updateLastUpdate();
            } catch (error) {
                console.error('加载内存数据失败:', error);
            }
        }

        function handleMemorySearch() {
            loadMemoryData();
        }

        function updateMemoryMetrics(data) {
            document.getElementById('longTermCount').textContent = data.long_term.total_count.toLocaleString();
            document.getElementById('shortTermCount').textContent = data.short_term.total_count;
            document.getElementById('overallHitRate').textContent = `${data.hit_rate.overall_hit_rate}%`;
            document.getElementById('hitRateProgress').style.width = `${data.hit_rate.overall_hit_rate}%`;
            document.getElementById('memorySize').textContent = data.long_term.total_size_mb;
        }

        function updateLongTermTrendChart(data) {
            const option = {
                backgroundColor: 'transparent',
                grid: { top: 20, right: 20, bottom: 30, left: 50 },
                xAxis: {
                    type: 'category',
                    data: data.growth_trend.map(d => d.date),
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94A3B8', fontSize: 10 }
                },
                yAxis: [
                    { type: 'value', name: '数量', axisLine: { lineStyle: { color: '#334155' } }, axisLabel: { color: '#94A3B8', fontSize: 10 } },
                    { type: 'value', name: '大小(MB)', axisLine: { lineStyle: { color: '#334155' } }, axisLabel: { color: '#94A3B8', fontSize: 10 } }
                ],
                series: [
                    { name: '数量', type: 'line', data: data.growth_trend.map(d => d.count), smooth: true, lineStyle: { color: '#4F46E5' }, itemStyle: { color: '#4F46E5' } },
                    { name: '大小', type: 'line', yAxisIndex: 1, data: data.growth_trend.map(d => d.size_mb), smooth: true, lineStyle: { color: '#10B981' }, itemStyle: { color: '#10B981' } }
                ],
                legend: { data: ['数量', '大小'], textStyle: { color: '#94A3B8' }, top: 0, right: 0 }
            };
            charts.longTermTrend.setOption(option);
        }

        function updateMemoryPieChart(data) {
            const colors = ['#4F46E5', '#3B82F6', '#10B981', '#F59E0B', '#EF4444'];
            
            const option = {
                backgroundColor: 'transparent',
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 8, borderColor: '#1E293B', borderWidth: 2 },
                    label: { show: true, color: '#F8FAFC', fontSize: 11, formatter: '{b}: {d}%' },
                    labelLine: { lineStyle: { color: '#94A3B8' } },
                    data: data.map((item, i) => ({ value: item.count, name: item.name, itemStyle: { color: colors[i % colors.length] } }))
                }]
            };
            charts.memoryPie.setOption(option);
        }

        function updateHitRateTrendChart(data) {
            const option = {
                backgroundColor: 'transparent',
                grid: { top: 20, right: 20, bottom: 30, left: 50 },
                xAxis: {
                    type: 'category',
                    data: data.trend.map(d => d.time),
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94A3B8', fontSize: 10 }
                },
                yAxis: {
                    type: 'value',
                    max: 100,
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94A3B8', fontSize: 10 }
                },
                series: [
                    { name: '命中率', type: 'line', data: data.trend.map(d => d.hit_rate), smooth: true, lineStyle: { color: '#10B981', width: 3 }, itemStyle: { color: '#10B981' } }
                ],
                areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(16, 185, 129, 0.3)' }, { offset: 1, color: 'rgba(16, 185, 129, 0)' }]) }
            };
            charts.hitRateTrend.setOption(option);
        }

        function updateMemoryRecentAccess(data) {
            const tbody = document.getElementById('memoryRecentAccess');
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td><span class="status-badge ${r.type === 'write' ? 'status-warning' : 'status-success'}">${r.type}</span></td>
                    <td>${r.category}</td>
                    <td>${r.content}</td>
                    <td>${formatTime(r.timestamp)}</td>
                </tr>
            `).join('');
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = `最后更新: ${now.toLocaleString('zh-CN')}`;
        }

        function refreshAllData() {
            if (currentTab === 'quality') {
                loadQualityData();
            } else if (currentTab === 'traces') {
                loadTraces();
            } else if (currentTab === 'memory') {
                loadMemoryData();
            }
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        window.addEventListener('resize', () => {
            Object.values(charts).forEach(chart => chart.resize());
        });

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadQualityData();
        });
    </script>
</body>
</html>
