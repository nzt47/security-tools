# GlitchTip Docker Compose 配置
# 自建错误追踪平台（Sentry 开源替代），用于验证 error_reporting_config.py 错误上报链路
#
# 启动方式：
#   cd docker/glitchtip
#   cp .env.example .env
#   # 编辑 .env 修改 SECRET_KEY 和密码
#   docker compose up -d
#
# 访问地址：http://localhost:8000
# 默认管理员：在首次访问时创建

version: "3.8"

services:
  # ─── PostgreSQL 数据库 ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: glitchtip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glitchtip}
      POSTGRES_USER: ${POSTGRES_USER:-glitchtip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glitchtip_dev_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # 映射到 5433 避免与本地 PostgreSQL 冲突
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glitchtip}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 缓存 + 任务队列 ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    restart: unless-stopped
    ports:
      - "6380:6379"  # 映射到 6380 避免与本地 Redis 冲突
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── GlitchTip Web（Django 应用） ──────────────────────
  web:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-glitchtip}:${POSTGRES_PASSWORD:-glitchtip_dev_pass}@postgres:5432/${POSTGRES_DB:-glitchtip}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      PORT: 8000
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
      # 【P7】管理员密码从 .env 传入容器（orm_setup_inline.py 读取）
      GLITCHTIP_ADMIN_PASSWORD: ${GLITCHTIP_ADMIN_PASSWORD:-}
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: 100
      ENABLE_SOCIAL_AUTH: ${ENABLE_SOCIAL_AUTH:-False}
      EMAIL_URL: ${EMAIL_URL:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@localhost}
    ports:
      - "8000:8000"
    volumes:
      - glitchtip-media:/code/uploads

  # ─── GlitchTip Worker（Celery 异步任务） ───────────────
  worker:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-glitchtip}:${POSTGRES_PASSWORD:-glitchtip_dev_pass}@postgres:5432/${POSTGRES_DB:-glitchtip}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: 100

volumes:
  postgres-data:
  glitchtip-media:
