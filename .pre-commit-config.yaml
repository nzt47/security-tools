# Pre-commit hooks 配置 — 关键字参数冲突扫描
#
# 安装:
#   pip install pre-commit
#   pre-commit install
#
# 手动运行:
#   pre-commit run kwarg-conflict-scan --all-files

repos:
  - repo: local
    hooks:
      - id: kwarg-conflict-scan
        name: 关键字参数冲突扫描 (HIGH 风险拦截)
        entry: python scripts/scan_kwarg_conflicts.py --path agent/ --min-risk HIGH
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
        description: >
          扫描 agent/ 目录中所有 .py 文件，检测
          func(explicit_kwarg=x, **dict) 模式中 dict 含同名键的冲突风险。
          发现 HIGH 风险时阻断提交（exit code 1）。

      - id: kwarg-conflict-scan-medium
        name: 关键字参数冲突扫描 (MEDIUM 风险提醒)
        entry: python scripts/scan_kwarg_conflicts.py --path agent/ --min-risk MEDIUM --format json
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
        description: >
          扫描 MEDIUM 级别风险，仅提醒不拦截（push 阶段运行）。
          MEDIUM 风险为外部函数签名已知的 **kwargs 转发，建议人工审查。
