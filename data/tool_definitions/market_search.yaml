name: market_search
category: uncategorized
description: 搜索扩展市场寻找可用工具。当你发现当前缺少某个能力时，用此工具搜索有没有现成的扩展可以安装。
deprecated: false
version: 1.0.0
schema:
  type: object
  properties:
    query:
      type: string
      description: 搜索关键词，如'发送邮件'、'日期计算'、'天气预报'
    category:
      type: string
      enum:
      - tool
      - skill
      - mcp
      - plugin
      - ''
      description: 过滤类别（留空搜索全部）
  required:
  - query
examples: []
