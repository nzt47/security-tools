name: schedule_task
category: schedule
description: 创建定时任务，按指定间隔或 cron 表达式周期性触发。必须提供 interval_minutes 或 cron_expr 之一（或两者）。cron
  为 5 字段格式：分 时 日 月 周。支持暂停/恢复/取消管理
deprecated: false
version: 1.0.0
schema:
  type: object
  properties:
    name:
      type: string
      description: 任务名称（必填）
    interval_minutes:
      type: integer
      description: 执行间隔（分钟）。如 5 表示每 5 分钟执行一次
    cron_expr:
      type: string
      description: cron 表达式（5字段 分 时 日 月 周）。如 0 9 * * * 表示每天9点，*/5 * * * * 每5分钟
    action:
      type: string
      description: 任务操作描述，如 run_shell_command
    params:
      type: object
      description: '执行参数，如 {"command": "echo hello"}'
  required:
  - name
examples: []
