name: read_pdf
category: pdf
description: 读取 PDF 文件中的文本内容（支持指定页码范围）
deprecated: false
version: 1.0.0
schema:
  type: object
  properties:
    path:
      type: string
      description: PDF 文件路径
    pages:
      type: array
      items:
        type: integer
      description: 要读取的页码列表（1-based），如 [1, 3, 5]，不传则读取全部页面
  required:
  - path
examples: []
