[pytest]
testpaths = tests

python_files = test_*.py *_test.py check_*.py verify_*.py
python_functions = test_* verify_* check_*
python_classes = Test* *Test*

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --strict-config
    --maxfail=10
    --ignore=tests/benchmark
    --ignore=memory/tests
    --ignore=cognitive/test_cognitive

markers =
    unit: 单元测试 - 测试单个模块或函数
    integration: 集成测试 - 测试模块间的交互
    e2e: 端到端测试 - 测试完整业务流程
    performance: 性能测试 - 性能基准测试
    stress: 压力测试 - 极限负载测试
    security: 安全测试 - 安全相关测试
    slow: 慢速测试 - 执行时间较长的测试
    quick: 快速测试 - 快速执行的测试
    critical: 关键测试 - 必须通过的测试
    p0: P0优先级测试
    p1: P1优先级测试
    p2: P2优先级测试 - 并发/跨平台/兼容性测试
    skip_ci: CI环境中跳过
    requires_llm: 需要LLM服务的测试
    chaos: 混沌测试 - 故障注入与极端场景稳定性验证

log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

[coverage:run]
branch = True
parallel = True
source = agent, core, memory, persona, planning, lifetrace
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
title = 云枢系统测试覆盖率报告